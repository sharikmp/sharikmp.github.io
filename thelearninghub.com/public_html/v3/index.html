<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SortVisualizer</title>
    <style>
        /* ==========================================================================
           CSS Configuration & Themes
========================================================================== */
        :root {
            /* Dark Theme (Premium Black/Gold) - Default */
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --surface-hover: #262626;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1d570;
            --accent-gold-dark: #aa8a29;
            --border-color: #333333;
            --log-bg: rgba(0, 0, 0, 0.3);

            /* Bar Status Colors */
            --bar-default: #404040;
            --bar-comparing: #e74c3c;
            --bar-swapping: #e67e22;
            --bar-sorted: #2ecc71;
            --bar-pivot: #9b59b6;

            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }


        /* ==========================================================================
           Reset & Base Styles
========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* ==========================================================================
           Layout & Header
========================================================================== */
        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent-gold);
        }

        /* ==========================================================================
           Main Content area & Panels
========================================================================== */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        /* Desktop Layout (50% Width each for Controls & Metrics) */
        @media(min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            justify-content: center;

        }

        .panel-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* ==========================================================================
           Controls inside Dashboard
========================================================================== */
        .controls-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem 0.5rem;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: center;
        }

        .control-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button,
        select {
            background-color: var(--surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            height: 32px;
            /* Fixed height to match inputs nicely */
        }

        button:hover,
        select:hover {
            border-color: var(--accent-gold);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
        }

        #sort-btn {
            background-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            font-size: 0.85rem;
        }

        #sort-btn:hover:not(:disabled) {
            background-color: var(--accent-gold-hover);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            padding: 0.5rem 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent-gold);
            margin-top: -5px;
            cursor: pointer;
        }

        /* ==========================================================================
           Algo Metrics Panel
           ========================================================================== */
        .algo-metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            text-align: center;
            height: 100%;
            align-items: center;
        }

        .algo-metric-item {
            background-color: var(--surface-hover);
            padding: 0.65rem 0.4rem 0.4rem;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        /* Info icon - click to open description modal */
        .info-icon {
            position: absolute;
            top: 5px;
            right: 6px;
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            font-size: 0.68rem;
            font-style: italic;
            font-family: Georgia, serif;
            font-weight: bold;
            color: var(--text-secondary);
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
            transition: border-color 0.15s, color 0.15s;
        }

        .info-icon:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .algo-metric-val {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.15;
        }

        .algo-metric-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Per-metric accent colors */
        .amc-red {
            color: var(--bar-comparing);
        }

        .amc-orange {
            color: var(--bar-swapping);
        }

        .amc-gold {
            color: var(--accent-gold);
        }

        /* ==========================================================================
           Metric Info Modal
           ========================================================================== */
        .metric-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 900;
        }

        .metric-modal-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 901;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-gold);
            border-radius: 10px;
            width: min(340px, 90vw);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: metricModalIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes metricModalIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.93);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .metric-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .metric-modal-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .metric-modal-close {
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            flex-shrink: 0;
        }

        .metric-modal-close:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .metric-modal-body {
            padding: 1rem;
            font-size: 0.83rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .metric-modal-backdrop.hidden,
        .metric-modal-box.hidden {
            display: none;
        }

        /* ==========================================================================
           Operation Log Panel
           ========================================================================== */
        .operation-log-panel {
            border: 1px solid var(--accent-gold-dark);
            border-left: 4px solid var(--accent-gold);
            padding: 0.5rem 0.75rem;
        }

        .log-container {
            height: 150px;
            overflow-y: auto;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-primary);
            padding: 0.4rem;
        }

        .log-entry {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 2px;
            font-size: 0.7rem;
            white-space: nowrap;
            /* keep horizontal scroll intact */
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-highlight {
            color: var(--accent-gold);
            font-weight: bold;
            display: inline-block;
            min-width: 75px;
        }

        /* ==========================================================================
           Visualizer Canvas (Bars & Indices)
           ========================================================================== */
        .canvas-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            /* Handle Horizontal Overflow Gracefully */
            overflow-x: auto;
            width: 100%;
            /* Extra padding top so lifted items don't clip */
            padding-top: 60px;
        }

        #array-container {
            height: 22vh;
            min-height: 150px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding-bottom: 20px;
            /* Space for index numbers */
            /* Trick to center when small, but prevent left-cutoff when large */
            width: max-content;
            min-width: 100%;
            justify-content: center;
            margin: 0 auto;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            height: 100%;
            min-width: 28px;
            max-width: 30px;
            /* overridden per-bar by BAR_MAX_WIDTH_PX in script.js */
            flex-grow: 1;
        }

        .array-bar {
            width: 100%;
            border-radius: 3px 3px 0 0;
            transition: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
            will-change: transform;
            position: relative;
            z-index: 1;
            /* Helps sorting layering for Y-axis lifts */
        }

        /* Value inside the bar */
        .bar-value {
            font-size: 0.65rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            font-family: var(--font-mono);
            writing-mode: horizontal-tb;
        }

        /* Index below the bar */
        .bar-index {
            position: absolute;
            bottom: -18px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        /* Color States */
        .bar-default {
            background-color: var(--bar-default) !important;
        }

        .bar-comparing {
            background-color: var(--bar-comparing) !important;
            animation: bar-pulse 0.3s ease-in-out;
        }

        .bar-swapping {
            background-color: var(--bar-swapping) !important;
            animation: bar-flash 0.25s ease-out;
        }

        .bar-sorted {
            background-color: var(--bar-sorted) !important;
            animation: bar-sorted-lock 0.4s ease-out;
        }

        .bar-pivot {
            background-color: var(--bar-pivot) !important;
            animation: bar-glow-pulse 1.2s ease-in-out infinite;
        }

        /* Bar value text: white when a colour state is active, gold on default */
        .bar-comparing .bar-value,
        .bar-swapping .bar-value,
        .bar-sorted .bar-value,
        .bar-pivot .bar-value {
            color: #fff;
        }

        /* --------------------------------------------------------------------------
   Phase 1: Bar State Keyframe Animations
   -------------------------------------------------------------------------- */

        /* Compare: bar pops up slightly and back */
        @keyframes bar-pulse {
            0% {
                transform: scaleX(1) scaleY(1);
            }

            40% {
                transform: scaleX(1.06) scaleY(1.04);
            }

            100% {
                transform: scaleX(1) scaleY(1);
            }
        }

        /* Swap: quick brightness flash then settle */
        @keyframes bar-flash {
            0% {
                filter: brightness(1);
            }

            30% {
                filter: brightness(1.7);
            }

            100% {
                filter: brightness(1);
            }
        }

        /* Sorted: scale up then snap down + ripple */
        @keyframes bar-sorted-lock {
            0% {
                transform: scaleX(1) scaleY(1);
                filter: brightness(1);
            }

            25% {
                transform: scaleX(1.08) scaleY(1.05);
                filter: brightness(1.6);
            }

            60% {
                transform: scaleX(0.97) scaleY(0.98);
                filter: brightness(1.1);
            }

            100% {
                transform: scaleX(1) scaleY(1);
                filter: brightness(1);
            }
        }

        /* Pivot: continuous soft glow throb */
        @keyframes bar-glow-pulse {
            0% {
                filter: brightness(1) drop-shadow(0 0 2px var(--bar-pivot));
            }

            50% {
                filter: brightness(1.4) drop-shadow(0 0 8px var(--bar-pivot));
            }

            100% {
                filter: brightness(1) drop-shadow(0 0 2px var(--bar-pivot));
            }
        }

        /* ==========================================================================
           Canvas Navigation (Prev/Next Step Buttons)
           ========================================================================== */
        .canvas-nav-wrapper {
            position: relative;
            width: 100%;
        }

        .nav-btn {
            position: absolute;
            top: 30px;
            z-index: 10;
            width: 36px;
            height: 36px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--accent-gold);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            opacity: 0.85;
        }

        .nav-btn-left {
            left: 10px;
        }

        .nav-btn-right {
            right: 10px;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent-gold);
            background: var(--surface-hover);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
            background: transparent !important;
        }

        /* Canvas takes full width of the wrapper */
        .canvas-nav-wrapper .canvas-container {
            width: 100%;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Legend hidden items */
        .legend-item.hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">Sort<span>Visualizer</span></div>
        </div>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Dashboard (Controls, Metrics) -->
        <div class="dashboard">

            <!-- Controls Panel -->
            <div class="panel">
                <div class="controls-inner">
                    <!-- Row 1 -->
                    <div class="control-group">
                        <label for="size-slider" class="control-label">Size: <span id="size-label">10</span></label>
                        <input type="range" id="size-slider" min="10" max="100" value="10">
                    </div>
                    <div class="control-group">
                        <label for="speed-slider" class="control-label">Speed: <span id="speed-label">1</span></label>
                        <input type="range" id="speed-slider" min="1" max="5" value="1">
                    </div>
                    <div class="control-group">
                        <select id="order-select">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>
                    <!-- Row 2 -->
                    <select id="algorithm-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                    <button id="generate-btn">New Array</button>
                    <button id="sort-btn">Start</button>
                </div>
            </div>

            <!-- Algo Metrics Panel -->
            <div class="panel">
                <div class="algo-metrics-grid">
                    <div class="algo-metric-item">
                        <span class="info-icon" data-info-key="comparisons">i</span>
                        <span id="stats-comparisons" class="algo-metric-val amc-red">0</span>
                        <span class="algo-metric-label">Comparisons</span>
                    </div>
                    <div class="algo-metric-item">
                        <span class="info-icon" data-info-key="swaps">i</span>
                        <span id="stats-swaps" class="algo-metric-val amc-orange">0</span>
                        <span class="algo-metric-label">Writes / Swaps</span>
                    </div>
                    <div class="algo-metric-item">
                        <span class="info-icon" data-info-key="runtime">i</span>
                        <span id="stats-runtime" class="algo-metric-val amc-gold">-</span>
                        <span class="algo-metric-label">Run Time (ms)</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Visualizer Canvas with Prev/Next Navigation -->
        <div class="canvas-nav-wrapper">
            <button id="prev-btn" class="nav-btn nav-btn-left" title="Previous Step" disabled>&#10094;</button>
            <div class="canvas-container">
                <div id="array-container"></div>
            </div>
            <button id="next-btn" class="nav-btn nav-btn-right" title="Next Step" disabled>&#10095;</button>
        </div>

        <!-- Legend -->
        <div class="legend" id="legend">
            <div class="legend-item" data-legend="unsorted">
                <div class="legend-color" style="background: var(--bar-default);"></div> Unsorted
            </div>
            <div class="legend-item" data-legend="comparing">
                <div class="legend-color" style="background: var(--bar-comparing);"></div> Comparing
            </div>
            <div class="legend-item" data-legend="swapping">
                <div class="legend-color" style="background: var(--bar-swapping);"></div> Swapping / Writing
            </div>
            <div class="legend-item" data-legend="pivot">
                <div class="legend-color" style="background: var(--bar-pivot);"></div> Pivot
            </div>
            <div class="legend-item" data-legend="sorted">
                <div class="legend-color" style="background: var(--bar-sorted);"></div> Sorted
            </div>
        </div>

        <!-- Operation Log -->
        <div class="panel operation-log-panel">
            <div id="operation-log-container" class="log-container"></div>
        </div>

    </main>

    <!-- Metric Info Modal -->
    <div id="metric-modal-backdrop" class="metric-modal-backdrop hidden"></div>
    <div id="metric-modal-box" class="metric-modal-box hidden">
        <div class="metric-modal-header">
            <span id="metric-modal-title" class="metric-modal-title"></span>
            <button id="metric-modal-close" class="metric-modal-close" title="Close">&#10005;</button>
        </div>
        <p id="metric-modal-body" class="metric-modal-body"></p>
    </div>

    <script>
        // ==========================================================================
        // SECTION 1: LOGIC LAYER — Algorithm Generators
        // ==========================================================================

        /**
         * Creates one immutable visual frame snapshot.
         * Pure function — no side effects.
         * Added 'elevs' parameter to track vertical lifts safely across frames.
         */
        function mkFrame(arr, clrs, comp, sw, log, animMeta, elevs = null) {
            return {
                values: [...arr],
                colors: [...clrs],
                comparisons: comp,
                swaps: sw,
                log: log,
                animMeta: animMeta || null,
                elevations: elevs ? [...elevs] : new Array(arr.length).fill(0)
            };
        }

        // --------------------------------------------------------------------------
        // Bubble Sort Generator
        // --------------------------------------------------------------------------
        function* bubbleSortGen(arr, isDesc) {
            const n = arr.length;
            const clrs = new Array(n).fill('bar-default');
            let comp = 0, sw = 0;

            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Start',
                details: `Bubble Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})`
            });

            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    clrs[j] = 'bar-comparing';
                    clrs[j + 1] = 'bar-comparing';
                    yield mkFrame(arr, clrs, comp, sw, {
                        opName: 'Compare',
                        details: `Index [${j}] (${arr[j]}) with Index [${j + 1}] (${arr[j + 1]})`
                    });
                    comp++;

                    if (isDesc ? arr[j] < arr[j + 1] : arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        clrs[j] = 'bar-swapping';
                        clrs[j + 1] = 'bar-swapping';
                        sw++;
                        yield mkFrame(arr, clrs, comp, sw, {
                            opName: 'Swap',
                            details: `Index [${j}] and Index [${j + 1}]`
                        }, { animType: 'swap', swapIndices: [j, j + 1] });
                        swapped = true;
                    }

                    clrs[j] = 'bar-default';
                    clrs[j + 1] = 'bar-default';
                }
                clrs[n - i - 1] = 'bar-sorted';
                if (!swapped) {
                    for (let k = 0; k < n - i - 1; k++) clrs[k] = 'bar-sorted';
                    break;
                }
            }
            clrs[0] = 'bar-sorted';
            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Complete',
                details: 'Bubble Sort finished successfully.'
            });
        }

        // --------------------------------------------------------------------------
        // Selection Sort Generator
        // --------------------------------------------------------------------------
        function* selectionSortGen(arr, isDesc) {
            const n = arr.length;
            const clrs = new Array(n).fill('bar-default');
            let comp = 0, sw = 0;

            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Start',
                details: `Selection Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})`
            });

            for (let i = 0; i < n - 1; i++) {
                let minIdx = i;
                clrs[i] = 'bar-swapping';
                yield mkFrame(arr, clrs, comp, sw, {
                    opName: 'Pass',
                    details: `Iteration ${i}, assumed target at [${i}] (value: ${arr[i]})`
                });

                for (let j = i + 1; j < n; j++) {
                    clrs[j] = 'bar-comparing';
                    yield mkFrame(arr, clrs, comp, sw, null);
                    comp++;

                    if (isDesc ? arr[j] > arr[minIdx] : arr[j] < arr[minIdx]) {
                        if (minIdx !== i) clrs[minIdx] = 'bar-default';
                        minIdx = j;
                        clrs[minIdx] = 'bar-swapping';
                        yield mkFrame(arr, clrs, comp, sw, {
                            opName: 'New Target',
                            details: `Found at index [${j}] (value: ${arr[j]})`
                        });
                    } else {
                        clrs[j] = 'bar-default';
                    }
                }

                if (minIdx !== i) {
                    [arr[minIdx], arr[i]] = [arr[i], arr[minIdx]];
                    sw++;
                    yield mkFrame(arr, clrs, comp, sw, {
                        opName: 'Swap',
                        details: `Starting element [${i}] with target element [${minIdx}]`
                    }, { animType: 'swap', swapIndices: [i, minIdx] });
                }
                clrs[minIdx] = 'bar-default';
                clrs[i] = 'bar-sorted';
            }
            clrs[n - 1] = 'bar-sorted';
            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Complete',
                details: 'Selection Sort finished successfully.'
            });
        }

        // --------------------------------------------------------------------------
        // Insertion Sort Generator (Updated with Lift/Shift/Drop Reusable Mechanics)
        // --------------------------------------------------------------------------
        function* insertionSortGen(arr, isDesc) {
            const n = arr.length;
            const clrs = new Array(n).fill('bar-default');
            const elevs = new Array(n).fill(0); // Tracking vertical elevation uniquely
            let comp = 0, sw = 0;

            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Start',
                details: `Insertion Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})`
            }, null, elevs);
            clrs[0] = 'bar-sorted';

            for (let i = 1; i < n; i++) {
                const key = arr[i];
                let j = i - 1;
                clrs[i] = 'bar-swapping';

                // LIFT the target key element physically up (-45px)
                elevs[i] = -45;
                yield mkFrame(arr, clrs, comp, sw, {
                    opName: 'Select & Lift',
                    details: `Index [${i}] (value: ${key}) lifted to find its sorted position`
                }, { animType: 'lift', index: i }, elevs);

                while (j >= 0) {
                    clrs[j] = 'bar-comparing';
                    yield mkFrame(arr, clrs, comp, sw, null, null, elevs);
                    comp++;

                    if (isDesc ? arr[j] < key : arr[j] > key) {
                        // To accurately trace physical DOM permutations across X and Y, we swap BOTH arrays.
                        // This simulates the lifted key moving "left" while grounded items slide "right" beneath.
                        [arr[j + 1], arr[j]] = [arr[j], arr[j + 1]];
                        [elevs[j + 1], elevs[j]] = [elevs[j], elevs[j + 1]];
                        sw++;

                        clrs[j + 1] = 'bar-swapping'; // The grounded element that shifted
                        clrs[j] = 'bar-swapping';     // The lifted element moving

                        yield mkFrame(arr, clrs, comp, sw, {
                            opName: 'Shift & Swap',
                            details: `Grounded [${j}] moved right, Lifted key moved left`
                        }, { animType: 'swap', swapIndices: [j, j + 1] }, elevs);

                        clrs[j + 1] = 'bar-sorted';
                        j--;
                    } else {
                        clrs[j] = 'bar-sorted';
                        break;
                    }
                }

                // DROP the key element back down (0px)
                elevs[j + 1] = 0;
                clrs[j + 1] = 'bar-sorted';
                for (let k = 0; k <= i; k++) clrs[k] = 'bar-sorted'; // Enforce sorting colour lock

                yield mkFrame(arr, clrs, comp, sw, {
                    opName: 'Drop',
                    details: `Key (${key}) dropped into correct sorted position [${j + 1}]`
                }, { animType: 'drop', index: j + 1 }, elevs);
            }

            yield mkFrame(arr, clrs, comp, sw, {
                opName: 'Complete',
                details: 'Insertion Sort finished successfully.'
            }, null, elevs);
        }

        // --------------------------------------------------------------------------
        // Merge Sort Generators
        // --------------------------------------------------------------------------
        function* _mergeStepGen(arr, l, m, r, clrs, stats, isDesc, totalLen) {
            const L = arr.slice(l, m + 1);
            const Rv = arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;

            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Merge Phase',
                details: `Subarrays Left [${l}-${m}] & Right [${m + 1}-${r}]`
            });

            while (i < L.length && j < Rv.length) {
                clrs[l + i] = 'bar-comparing';
                clrs[m + 1 + j] = 'bar-comparing';
                yield mkFrame(arr, clrs, stats.comp, stats.sw, null);
                stats.comp++;

                const takeLeft = isDesc ? L[i] >= Rv[j] : L[i] <= Rv[j];
                if (takeLeft) { arr[k] = L[i]; i++; } else { arr[k] = Rv[j]; j++; }
                stats.sw++;
                clrs[k] = 'bar-swapping';
                yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                    opName: 'Write',
                    details: `Value ${arr[k]} into index [${k}]`
                });
                clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                if (l + i < totalLen) clrs[l + i] = 'bar-default';
                if (m + 1 + j < totalLen) clrs[m + 1 + j] = 'bar-default';
                k++;
            }

            while (i < L.length) {
                arr[k] = L[i];
                clrs[k] = 'bar-swapping';
                stats.sw++;
                yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                    opName: 'Copy',
                    details: `Remaining Left element ${arr[k]} to [${k}]`
                });
                clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                i++; k++;
            }

            while (j < Rv.length) {
                arr[k] = Rv[j];
                clrs[k] = 'bar-swapping';
                stats.sw++;
                yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                    opName: 'Copy',
                    details: `Remaining Right element ${arr[k]} to [${k}]`
                });
                clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                j++; k++;
            }
        }

        function* _mergeHelperGen(arr, l, r, clrs, stats, isDesc, totalLen) {
            if (l >= r) return;
            const m = l + Math.floor((r - l) / 2);
            yield* _mergeHelperGen(arr, l, m, clrs, stats, isDesc, totalLen);
            yield* _mergeHelperGen(arr, m + 1, r, clrs, stats, isDesc, totalLen);
            yield* _mergeStepGen(arr, l, m, r, clrs, stats, isDesc, totalLen);
        }

        function* mergeSortGen(arr, isDesc) {
            const n = arr.length;
            const clrs = new Array(n).fill('bar-default');
            const stats = { comp: 0, sw: 0 };

            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Start',
                details: `Merge Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})`
            });
            yield* _mergeHelperGen(arr, 0, n - 1, clrs, stats, isDesc, n);
            for (let i = 0; i < n; i++) clrs[i] = 'bar-sorted';
            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Complete',
                details: 'Merge Sort finished successfully.'
            });
        }

        // --------------------------------------------------------------------------
        // Quick Sort Generators
        // --------------------------------------------------------------------------
        function* _quickPartitionGen(arr, low, high, clrs, stats, isDesc) {
            const pivot = arr[high];
            clrs[high] = 'bar-pivot';
            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Partition',
                details: `Array [${low}-${high}], Pivot at [${high}] (value: ${pivot})`
            });

            let i = low - 1;
            for (let j = low; j <= high - 1; j++) {
                clrs[j] = 'bar-comparing';
                yield mkFrame(arr, clrs, stats.comp, stats.sw, null);
                stats.comp++;

                if (isDesc ? arr[j] > pivot : arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    clrs[i] = 'bar-swapping';
                    clrs[j] = 'bar-swapping';
                    stats.sw++;
                    yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                        opName: 'Swap',
                        details: `Value ${arr[j]} ${isDesc ? '>' : '<'} pivot. Swapping [${i}] & [${j}]`
                    }, { animType: 'swap', swapIndices: [i, j] });
                    clrs[i] = 'bar-default';
                }
                clrs[j] = 'bar-default';
            }

            const pivotFinalIdx = i + 1;
            [arr[pivotFinalIdx], arr[high]] = [arr[high], arr[pivotFinalIdx]];
            clrs[pivotFinalIdx] = 'bar-sorted';
            clrs[high] = 'bar-default';
            stats.sw++;
            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Place Pivot',
                details: `Pivot (${pivot}) moved to correct position [${pivotFinalIdx}]`
            }, { animType: 'swap', swapIndices: [pivotFinalIdx, high] });
            return pivotFinalIdx;
        }

        function* _quickHelperGen(arr, low, high, clrs, stats, isDesc) {
            if (low < high) {
                const pi = yield* _quickPartitionGen(arr, low, high, clrs, stats, isDesc);
                yield* _quickHelperGen(arr, low, pi - 1, clrs, stats, isDesc);
                yield* _quickHelperGen(arr, pi + 1, high, clrs, stats, isDesc);
            } else if (low >= 0 && low < arr.length) {
                clrs[low] = 'bar-sorted';
            }
        }

        function* quickSortGen(arr, isDesc) {
            const n = arr.length;
            const clrs = new Array(n).fill('bar-default');
            const stats = { comp: 0, sw: 0 };

            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Start',
                details: `Quick Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})`
            });
            yield* _quickHelperGen(arr, 0, n - 1, clrs, stats, isDesc);
            for (let i = 0; i < arr.length; i++) clrs[i] = 'bar-sorted';
            yield mkFrame(arr, clrs, stats.comp, stats.sw, {
                opName: 'Complete',
                details: 'Quick Sort finished successfully.'
            });
        }

        // --------------------------------------------------------------------------
        // Main Dispatcher
        // --------------------------------------------------------------------------
        function* sortGenerator(algo, arr, isDesc) {
            const copy = [...arr];
            switch (algo) {
                case 'bubble': yield* bubbleSortGen(copy, isDesc); break;
                case 'selection': yield* selectionSortGen(copy, isDesc); break;
                case 'insertion': yield* insertionSortGen(copy, isDesc); break;
                case 'merge': yield* mergeSortGen(copy, isDesc); break;
                case 'quick': yield* quickSortGen(copy, isDesc); break;
            }
        }


        // ==========================================================================
        // SECTION 2: ANIMATION ENGINE
        // ==========================================================================

        let array = [];      // source of truth: current bar values
        let frames = [];      // pre-collected frame snapshots (drained from generator)
        let frameIndex = 0;       // current render position within frames[]
        let animState = 'idle';  // 'idle' | 'playing' | 'paused' | 'done'
        let delay = 1000;    // ms between auto-play ticks
        let playTimer = null;    // setTimeout handle

        /**
         * Drains the generator for the given algo/array/order into a frames array.
         * Frame 0 is a "Ready" state (before any algorithm operation).
         * frames.runTimeMs stores the measured generator-drain time.
         */
        function collectFrames(algo, sourceArray, isDesc) {
            const result = [];

            // Frame 0: initial state — all bars default color, zero stats, zero elevation
            result.push({
                values: [...sourceArray],
                colors: new Array(sourceArray.length).fill('bar-default'),
                comparisons: 0,
                swaps: 0,
                elevations: new Array(sourceArray.length).fill(0),
                log: {
                    opName: 'Ready',
                    details: `Array of size ${sourceArray.length} loaded. Press Start or use ‹ › to step.`
                }
            });

            const gen = sortGenerator(algo, sourceArray, isDesc);
            const t0 = performance.now();
            for (const frame of gen) result.push(frame);
            result.runTimeMs = Math.round((performance.now() - t0) * 100) / 100;

            return result;
        }

        // ==========================================================================
        // SECTION 2a: ANIMATION HELPERS (Phase 2)
        // ==========================================================================

        /**
         * Returns a Promise that resolves on the element's next transitionend event.
         * Falls back to resolving after timeoutMs if transitionend never fires
         * (e.g. dx === 0, element hidden, browser skips transition).
         */
        function waitForTransition(el, timeoutMs) {
            return new Promise(resolve => {
                const fallback = setTimeout(resolve, timeoutMs);
                el.addEventListener('transitionend', () => {
                    clearTimeout(fallback);
                    resolve();
                }, { once: true });
            });
        }

        /** Clamps a CSS transition duration so it never exceeds the frame delay or is too short. */
        function clampDur(ms) {
            return Math.max(80, Math.min(ms, 500));
        }

        /**
         * Slides bars at idxA and idxB across each other on the X-axis, while seamlessly
         * retaining any pre-existing Y-axis translations (lifts).
         */
        async function animateSwap(idxA, idxB, frame) {
            const barA = ui.bars[idxA].bar;
            const barB = ui.bars[idxB].bar;

            // Track any existing elevation to carry it through the X transition
            const elevA = parseInt(barA.dataset.elev || '0', 10);
            const elevB = parseInt(barB.dataset.elev || '0', 10);

            const rectA = barA.getBoundingClientRect();
            const rectB = barB.getBoundingClientRect();
            const dx = rectB.left - rectA.left;
            const dur = clampDur(delay * 0.6);

            barA.style.transition = `transform ${dur}ms ease`;
            barB.style.transition = `transform ${dur}ms ease`;

            // Animate X gap while holding current Y elevation
            barA.style.transform = `translateX(${dx}px) translateY(${elevA}px)`;
            barB.style.transform = `translateX(${-dx}px) translateY(${elevB}px)`;

            await waitForTransition(barA, dur + 50);

            // Snapshot: disable transitions momentarily so height/colour/elev snap is completely invisible
            barA.style.transition = 'none';
            barB.style.transition = 'none';
            barA.style.transform = '';
            barB.style.transform = '';
        }

        /** Applies the frame at idx to DOM bars, stats and log. */
        async function renderFrame(idx) {
            const frame = frames[idx];
            if (!frame) return;

            if (frame.animMeta?.animType === 'swap') {
                const [idxA, idxB] = frame.animMeta.swapIndices;
                // Run sliding animation (waits for slide to complete)
                await animateSwap(idxA, idxB, frame);

                // After physical slide, snap ALL bars safely to frame state
                for (let i = 0; i < ui.bars.length; i++) {
                    ui.setBarHeight(i, frame.values[i]);
                    ui.setBarColor(i, frame.colors[i]);
                    ui.setBarElevation(i, frame.elevations[i]);
                }
            } else if (frame.animMeta?.animType === 'lift' || frame.animMeta?.animType === 'drop') {
                // Handle vertical physical transitions
                const targetIdx = frame.animMeta.index;
                const bar = ui.bars[targetIdx].bar;
                const dur = clampDur(delay * 0.4);

                // Instantly sync the background matrix (elements not involved in transition)
                for (let i = 0; i < ui.bars.length; i++) {
                    if (i === targetIdx) continue;
                    ui.setBarHeight(i, frame.values[i]);
                    ui.setBarColor(i, frame.colors[i]);
                    ui.setBarElevation(i, frame.elevations[i]);
                }

                // Apply new values to target, but enable smooth transition specifically for its Y-axis transform
                ui.setBarHeight(targetIdx, frame.values[targetIdx]);
                ui.setBarColor(targetIdx, frame.colors[targetIdx]);
                bar.style.transition = `transform ${dur}ms ease`;
                ui.setBarElevation(targetIdx, frame.elevations[targetIdx]);

                // Pause the global render loop while lift/drop completes visually
                await waitForTransition(bar, dur + 50);
                bar.style.transition = 'none';
            } else {
                // Standard State Change (Comparisons, color flips, static holds)
                for (let i = 0; i < ui.bars.length; i++) {
                    ui.setBarHeight(i, frame.values[i]);
                    ui.setBarColor(i, frame.colors[i]);
                    ui.setBarElevation(i, frame.elevations[i]);
                }
            }

            ui.updateStats(frame.comparisons, frame.swaps);

            // Replay log from frame 0 → idx so backward navigation works correctly
            ui.clearLog();
            for (let i = 0; i <= idx; i++) {
                if (frames[i].log) ui.appendLogEntry(frames[i].log.opName, frames[i].log.details);
            }

            frameIndex = idx;
        }

        /** Single source of truth for button enabled/label state. */
        function updateButtonStates() {
            const atStart = frameIndex === 0;
            const atEnd = frameIndex === frames.length - 1;

            if (animState === 'playing') {
                ui.sortBtn.innerText = 'Pause';
                ui.sortBtn.disabled = false;
                ui.prevBtn.disabled = true;
                ui.nextBtn.disabled = true;
            } else if (animState === 'done') {
                ui.sortBtn.innerText = 'Start';
                ui.sortBtn.disabled = false;
                ui.prevBtn.disabled = atStart;
                ui.nextBtn.disabled = true;  // already at last frame
            } else {
                // idle or paused
                ui.sortBtn.innerText = animState === 'paused' ? 'Resume' : 'Start';
                ui.sortBtn.disabled = false;
                ui.prevBtn.disabled = atStart;
                ui.nextBtn.disabled = atEnd;
            }
        }

        function playAuto() {
            animState = 'playing';
            updateButtonStates();

            async function tick() {
                if (animState !== 'playing') return;
                const next = frameIndex + 1;
                if (next >= frames.length) {
                    animState = 'done';
                    updateButtonStates();
                    return;
                }
                await renderFrame(next);
                // Re-check state after async animation (user may have paused during swap)
                if (animState !== 'playing') return;
                if (next === frames.length - 1) {
                    animState = 'done';
                    updateButtonStates();
                } else {
                    playTimer = setTimeout(tick, delay);
                }
            }

            playTimer = setTimeout(tick, delay);
        }

        function pauseAuto() {
            clearTimeout(playTimer);
            animState = 'paused';
            updateButtonStates();
        }

        function togglePlay() {
            if (animState === 'playing') {
                pauseAuto();
            } else if (animState === 'paused') {
                playAuto();
            } else {
                // idle or done — if done, restart from frame 0 first
                if (animState === 'done') renderFrame(0);
                playAuto();
            }
        }

        function updateDelay() {
            const speed = parseInt(ui.speedSlider.value);
            ui.speedLabel.innerText = speed;
            delay = speed === 100 ? 2 : 1000 / Math.pow(speed, 0.85);
        }

        /** Re-collects frames for same array with new algo/order. Resets to frame 0. */
        function reCollectFrames() {
            clearTimeout(playTimer);
            animState = 'idle';
            const algo = ui.algorithmSelect.value;
            const isDesc = ui.orderSelect.value === 'desc';
            frames = collectFrames(algo, array, isDesc);
            ui.statsRuntime.innerText = frames.runTimeMs;
            frameIndex = 0;
            renderFrame(0);
            updateButtonStates();
        }

        /** Generates a fresh random array, rebuilds DOM bars, re-collects frames. */
        function generateArray() {
            clearTimeout(playTimer);
            animState = 'idle';

            const size = parseInt(ui.sizeSlider.value);
            ui.sizeLabel.innerText = size;

            array = [];
            ui.buildBars(size);

            for (let i = 0; i < size; i++) {
                const value = Math.floor(Math.random() * 96) + 5;
                array.push(value);
                ui.setBarHeight(i, value);
                ui.setBarColor(i, 'bar-default');
                ui.setBarElevation(i, 0);
            }

            reCollectFrames();
        }


        // ==========================================================================
        // SECTION 3: UI LAYER
        // ==========================================================================

        const BAR_MAX_WIDTH_PX = 25;

        const ui = {

            // ---- DOM References ----
            container: document.getElementById('array-container'),
            sizeSlider: document.getElementById('size-slider'),
            speedSlider: document.getElementById('speed-slider'),
            algorithmSelect: document.getElementById('algorithm-select'),
            orderSelect: document.getElementById('order-select'),
            generateBtn: document.getElementById('generate-btn'),
            sortBtn: document.getElementById('sort-btn'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            sizeLabel: document.getElementById('size-label'),
            speedLabel: document.getElementById('speed-label'),
            statsComp: document.getElementById('stats-comparisons'),
            statsSwaps: document.getElementById('stats-swaps'),
            statsRuntime: document.getElementById('stats-runtime'),
            logContainer: document.getElementById('operation-log-container'),
            legend: document.getElementById('legend'),

            // Metric modal
            metricModalBackdrop: document.getElementById('metric-modal-backdrop'),
            metricModalBox: document.getElementById('metric-modal-box'),
            metricModalTitle: document.getElementById('metric-modal-title'),
            metricModalBody: document.getElementById('metric-modal-body'),
            metricModalClose: document.getElementById('metric-modal-close'),

            // ---- Bar State ----
            bars: [],   // array of { bar: HTMLElement, valSpan: HTMLElement }

            // ---- Bar DOM Methods ----
            buildBars(size) {
                this.container.innerHTML = '';
                this.bars = [];
                for (let i = 0; i < size; i++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'bar-wrapper';
                    wrapper.style.maxWidth = `${BAR_MAX_WIDTH_PX}px`;

                    const bar = document.createElement('div');
                    bar.className = 'array-bar bar-default';
                    bar.style.height = '0%';
                    bar.dataset.elev = '0'; // Initialization logic for Elevation

                    const valSpan = document.createElement('span');
                    valSpan.className = 'bar-value';
                    bar.appendChild(valSpan);

                    const idxSpan = document.createElement('span');
                    idxSpan.className = 'bar-index';
                    idxSpan.innerText = i;

                    wrapper.appendChild(bar);
                    wrapper.appendChild(idxSpan);
                    this.container.appendChild(wrapper);
                    this.bars.push({ bar, valSpan });
                }
            },

            setBarHeight(i, value) {
                if (!this.bars[i]) return;
                this.bars[i].bar.style.height = `${value}%`;
                this.bars[i].valSpan.innerText = value;
            },

            setBarColor(i, colorClass) {
                if (!this.bars[i]) return;
                this.bars[i].bar.className = `array-bar ${colorClass}`;
            },

            setBarElevation(i, elev) {
                if (!this.bars[i]) return;
                const bar = this.bars[i].bar;
                bar.dataset.elev = elev;
                bar.style.transform = `translateY(${elev}px)`;
                // If element is actively lifted (elev < 0), render it overlapping others.
                bar.style.zIndex = elev < 0 ? '10' : '1';
            },

            // ---- Stats ----
            updateStats(comp, sw) {
                this.statsComp.innerText = comp;
                this.statsSwaps.innerText = sw;
            },

            // ---- Log ----
            clearLog() {
                this.logContainer.innerHTML = '';
            },

            appendLogEntry(opName, details) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span class="log-highlight">${opName}:</span> ${details}`;
                this.logContainer.appendChild(entry);
                this.logContainer.scrollTop = this.logContainer.scrollHeight;
            },

            // ---- Legend ----
            algoLegendKeys: {
                bubble: ['unsorted', 'comparing', 'swapping', 'sorted'],
                selection: ['unsorted', 'comparing', 'swapping', 'sorted'],
                insertion: ['unsorted', 'comparing', 'swapping', 'sorted'],
                merge: ['unsorted', 'comparing', 'swapping', 'sorted'],
                quick: ['unsorted', 'comparing', 'swapping', 'pivot', 'sorted'],
            },

            updateLegend(algo) {
                const active = new Set(this.algoLegendKeys[algo] || []);
                this.legend.querySelectorAll('.legend-item').forEach(item => {
                    item.classList.toggle('hidden', !active.has(item.dataset.legend));
                });
            },

            // ---- Metric Info Modal ----
            metricInfoData: {
                comparisons: {
                    title: 'Comparisons',
                    body: 'The total number of times the algorithm compared two elements side-by-side to determine their order. A higher count reflects more work done. This maps directly to the algorithm\'s time complexity - Bubble Sort repeats many redundant comparisons, while Merge Sort is disciplined and consistent across all inputs.'
                },
                swaps: {
                    title: 'Writes / Swaps',
                    body: 'The total number of times an element was moved, shifted, or exchanged in the array. Selection Sort minimises writes (at most n-1 swaps total) making it ideal when write cost is high. Insertion Sort shifts elements rather than full swaps. Write count reflects how much the algorithm disturbs the array.'
                },
                runtime: {
                    title: 'Run Time (ms)',
                    body: 'The actual wall-clock time in milliseconds taken to drain the sort generator and pre-collect all frames. This excludes visual rendering and playback delay — it reflects raw algorithmic performance of this sort in your browser\'s JS runtime.'
                }
            },

            openMetricModal(key) {
                const d = this.metricInfoData[key];
                if (!d) return;
                this.metricModalTitle.innerText = d.title;
                this.metricModalBody.innerText = d.body;
                this.metricModalBackdrop.classList.remove('hidden');
                this.metricModalBox.classList.remove('hidden');
            },

            closeMetricModal() {
                this.metricModalBackdrop.classList.add('hidden');
                this.metricModalBox.classList.add('hidden');
            },

            // ---- Event Binding ----
            bindEvents() {
                this.generateBtn.addEventListener('click', generateArray);

                this.sizeSlider.addEventListener('input', () => {
                    this.sizeLabel.innerText = this.sizeSlider.value;
                    if (animState !== 'playing') generateArray();
                });

                this.speedSlider.addEventListener('input', updateDelay);

                this.algorithmSelect.addEventListener('change', () => {
                    this.updateLegend(this.algorithmSelect.value);
                    if (animState !== 'playing') reCollectFrames();
                });

                this.orderSelect.addEventListener('change', () => {
                    if (animState !== 'playing') reCollectFrames();
                });

                this.sortBtn.addEventListener('click', togglePlay);

                this.prevBtn.addEventListener('click', async () => {
                    if (frameIndex > 0) {
                        await renderFrame(frameIndex - 1);
                        updateButtonStates();
                    }
                });

                this.nextBtn.addEventListener('click', async () => {
                    if (frameIndex < frames.length - 1) {
                        await renderFrame(frameIndex + 1);
                        updateButtonStates();
                    }
                });

                // Metric info modal
                document.querySelectorAll('.info-icon').forEach(icon => {
                    icon.addEventListener('click', () => this.openMetricModal(icon.dataset.infoKey));
                });
                this.metricModalClose.addEventListener('click', () => this.closeMetricModal());
                this.metricModalBackdrop.addEventListener('click', () => this.closeMetricModal());
                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape' && !this.metricModalBackdrop.classList.contains('hidden')) {
                        this.closeMetricModal();
                    }
                });
            }
        };


        // ==========================================================================
        // SECTION 4: INIT
        // ==========================================================================

        function init() {
            ui.bindEvents();
            updateDelay();
            ui.updateLegend(ui.algorithmSelect.value);
            generateArray();
        }

        window.onload = init;

    </script>

</body>

</html>
