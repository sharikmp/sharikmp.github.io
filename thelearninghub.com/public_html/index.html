<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sorting Algorithm Visualizer</title>
    <style>
        /* ==========================================================================
           CSS Configuration & Themes
           ========================================================================== */
        :root {
            /* Dark Theme (Premium Black/Gold) - Default */
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --surface-hover: #262626;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1d570;
            --accent-gold-dark: #aa8a29;
            --border-color: #333333;
            --log-bg: rgba(0, 0, 0, 0.3);
            
            /* Bar Status Colors */
            --bar-default: #404040;
            --bar-comparing: #e74c3c;
            --bar-swapping: #e67e22;
            --bar-sorted: #2ecc71;
            --bar-pivot: #9b59b6;
            
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        [data-theme="light"] {
            /* Light Theme (White/Dark Gold) */
            --bg-color: #f0f0f0;
            --surface-color: #ffffff;
            --surface-hover: #e8e8e8;
            --text-primary: #121212;
            --text-secondary: #555555;
            --accent-gold: #b8860b;
            --accent-gold-hover: #d4a017;
            --accent-gold-dark: #8b6508;
            --border-color: #cccccc;
            --log-bg: rgba(0, 0, 0, 0.05);
            
            /* Bar Status Colors */
            --bar-default: #b3b3b3;
            --bar-comparing: #e74c3c;
            --bar-swapping: #e67e22;
            --bar-sorted: #27ae60;
            --bar-pivot: #8e44ad;
        }

        /* ==========================================================================
           Reset & Base Styles
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden; /* Prevent body horizontal scroll */
        }

        /* ==========================================================================
           Layout & Header
           ========================================================================== */
        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent-gold);
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            padding: 0;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .theme-toggle:hover {
            border-color: var(--accent-gold);
        }

        /* ==========================================================================
           Main Content area & Panels
           ========================================================================== */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        /* Desktop Layout (50% Width each for Controls & Metrics) */
        @media(min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            /* background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px; */
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* ==========================================================================
           Controls inside Dashboard
           ========================================================================== */
        .controls-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem 0.5rem;
            align-items: end; /* Aligns inputs, selects, and buttons by their bottom edge */
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: center;
        }

        .control-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button, select {
            background-color: var(--surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            height: 32px; /* Fixed height to match inputs nicely */
        }

        button:hover, select:hover {
            border-color: var(--accent-gold);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
        }

        #sort-btn {
            background-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            font-size: 0.85rem;
        }

        #sort-btn:hover:not(:disabled) {
            background-color: var(--accent-gold-hover);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            padding: 0.5rem 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent-gold);
            margin-top: -5px;
            cursor: pointer;
        }

        /* ==========================================================================
           Merged Metrics Panel
           ========================================================================== */
        .merged-metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            text-align: center;
            height: 100%;
            align-items: center;
        }
        
        @media(min-width: 1024px) {
            .merged-metrics-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        .complexity-item {
            background-color: var(--surface-hover);
            padding: 0.4rem;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }
        
        .complexity-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
        }
        
        .complexity-val {
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        
        .text-best { color: var(--bar-sorted); }
        .text-avg { color: var(--bar-swapping); }
        .text-worst { color: var(--bar-comparing); }
        .text-live { color: var(--text-primary); font-weight: bold; font-size: 1.1rem; }

        /* ==========================================================================
           Operation Log Panel
           ========================================================================== */
        .operation-log-panel {
            border: 1px solid var(--accent-gold-dark);
            border-left: 4px solid var(--accent-gold);
            padding: 0.5rem 0.75rem;
        }

        .log-container {
            height: 150px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-primary);
            padding: 0.4rem;
        }

        .log-entry {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 2px;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-highlight {
            color: var(--accent-gold);
            font-weight: bold;
            display: inline-block;
            min-width: 75px;
        }

        /* ==========================================================================
           Visualizer Canvas (Bars & Indices)
           ========================================================================== */
        .canvas-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            /* Handle Horizontal Overflow Gracefully */
            overflow-x: auto; 
            width: 100%;
        }

        #array-container {
            height: 30vh;
            min-height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding-bottom: 20px; /* Space for index numbers */
            /* Trick to center when small, but prevent left-cutoff when large */
            width: max-content;
            min-width: 100%;
            justify-content: center;
            margin: 0 auto;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            height: 100%;
            min-width: 28px; /* Ensure space for numbers */
            max-width: 40px; /* Cap the width of bars */
            flex-grow: 1;
        }

        .array-bar {
            width: 100%;
            border-radius: 3px 3px 0 0;
            transition: background-color 0.1s ease-in-out, height 0.1s ease-in-out;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
        }

        /* Value inside the bar */
        .bar-value {
            font-size: 0.65rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            font-family: var(--font-mono);
            writing-mode: horizontal-tb;
        }

        /* Index below the bar */
        .bar-index {
            position: absolute;
            bottom: -18px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        /* Color States */
        .bar-default { background-color: var(--bar-default) !important; }
        .bar-comparing { background-color: var(--bar-comparing) !important; }
        .bar-swapping { background-color: var(--bar-swapping) !important; }
        .bar-sorted { background-color: var(--bar-sorted) !important; }
        .bar-pivot { background-color: var(--bar-pivot) !important; }

        /* ==========================================================================
           Canvas Navigation (Prev/Next Step Buttons)
           ========================================================================== */
        .canvas-nav-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }

        .nav-btn {
            flex-shrink: 0;
            width: 40px;
            height: 60px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--accent-gold);
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent-gold);
            background: var(--surface-hover);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
            background: transparent !important;
        }

        /* Canvas container takes remaining space inside wrapper */
        .canvas-nav-wrapper .canvas-container {
            flex: 1;
            min-width: 0;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">Sort<span>Visualizer</span></div>
            <button id="theme-btn" class="theme-toggle" title="Toggle Theme">☀️</button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        
        <!-- Dashboard (Controls, Metrics) -->
        <div class="dashboard">
            
            <!-- Controls Panel -->
            <div class="panel">
                <!-- <h3 class="panel-title">Controls</h3> -->
                <div class="controls-inner">
                    <!-- Row 1 -->
                    <div class="control-group">
                        <label for="size-slider" class="control-label">Size: <span id="size-label">10</span></label>
                        <input type="range" id="size-slider" min="5" max="100" value="10">
                    </div>
                    <div class="control-group">
                        <label for="speed-slider" class="control-label">Speed: <span id="speed-label">1</span></label>
                        <input type="range" id="speed-slider" min="1" max="100" value="1">
                    </div>
                    <div class="control-group">
                        <!-- <label for="order-select" class="control-label">Order</label> -->
                        <select id="order-select">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>

                    <!-- Row 2 -->
                    <select id="algorithm-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                    <button id="generate-btn">New Array</button>
                    <button id="sort-btn">Start Sorting!</button>
                </div>

            </div>


            <!-- Merged Metrics Panel -->
            <div class="panel">
                <!-- <h3 class="panel-title" id="algo-name">Bubble Sort Metrics</h3> -->
                <div class="merged-metrics-grid">
                    <div class="complexity-item">
                        <span class="complexity-label">Best</span>
                        <span id="comp-best" class="complexity-val text-best">O(n)</span>
                    </div>
                    <div class="complexity-item">
                        <span class="complexity-label">Average</span>
                        <span id="comp-avg" class="complexity-val text-avg">O(n²)</span>
                    </div>
                    <div class="complexity-item">
                        <span class="complexity-label">Worst</span>
                        <span id="comp-worst" class="complexity-val text-worst">O(n²)</span>
                    </div>
                    <div class="complexity-item">
                        <span class="complexity-label">Comparisons</span>
                        <span id="stats-comparisons" class="complexity-val text-live">0</span>
                    </div>
                    <div class="complexity-item">
                        <span class="complexity-label">Writes / Swaps</span>
                        <span id="stats-swaps" class="complexity-val text-live">0</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Operation Log -->
        <div class="panel operation-log-panel">
            <!-- <h3 class="panel-title" style="text-align: left; margin-bottom: 0.4rem;">Live Operation Log</h3> -->
            <div id="operation-log-container" class="log-container">
                <!-- Logs appended here via JS -->
            </div>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: var(--bar-default);"></div> Unsorted</div>
            <div class="legend-item"><div class="legend-color" style="background: var(--bar-comparing);"></div> Comparing</div>
            <div class="legend-item"><div class="legend-color" style="background: var(--bar-swapping);"></div> Swapping / Writing</div>
            <div class="legend-item"><div class="legend-color" style="background: var(--bar-pivot);"></div> Pivot</div>
            <div class="legend-item"><div class="legend-color" style="background: var(--bar-sorted);"></div> Sorted</div>
        </div>

        <!-- Visualizer Canvas with Prev/Next Navigation -->
        <div class="canvas-nav-wrapper">
            <button id="prev-btn" class="nav-btn" title="Previous Step" disabled>&#10094;</button>
            <div class="canvas-container">
                <div id="array-container"></div>
            </div>
            <button id="next-btn" class="nav-btn" title="Next Step" disabled>&#10095;</button>
        </div>

    </main>

    <script>
        // ==========================================================================
        // JS Logic — Step-Recording Architecture
        // ==========================================================================

        // --- State Variables ---
        let array = [];           // current bar values (source of truth for recordings)
        let bars = [];            // DOM bar references
        let delay = 1000;         // ms between auto-play ticks

        // Step-recording state
        let steps = [];           // pre-computed snapshots
        let stepIndex = 0;        // current position within steps
        let appState = 'idle';    // 'idle' | 'playing' | 'paused' | 'done'
        let playTimer = null;     // setTimeout handle for auto-play

        // --- DOM Elements ---
        const container = document.getElementById('array-container');
        const sizeSlider = document.getElementById('size-slider');
        const speedSlider = document.getElementById('speed-slider');
        const orderSelect = document.getElementById('order-select');
        const generateBtn = document.getElementById('generate-btn');
        const sortBtn = document.getElementById('sort-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const algorithmSelect = document.getElementById('algorithm-select');
        const themeBtn = document.getElementById('theme-btn');
        const body = document.documentElement;

        // Stats & UI
        const statsComp = document.getElementById('stats-comparisons');
        const statsSwaps = document.getElementById('stats-swaps');
        const sizeLabel = document.getElementById('size-label');
        const speedLabel = document.getElementById('speed-label');
        const logContainer = document.getElementById('operation-log-container');

        // Complexity Info
        const compBest = document.getElementById('comp-best');
        const compAvg = document.getElementById('comp-avg');
        const compWorst = document.getElementById('comp-worst');

        // --- Complexity Data ---
        const complexities = {
            bubble:    { best: 'O(n)',       avg: 'O(n²)',      worst: 'O(n²)'      },
            selection: { best: 'O(n²)',      avg: 'O(n²)',      worst: 'O(n²)'      },
            insertion: { best: 'O(n)',       avg: 'O(n²)',      worst: 'O(n²)'      },
            merge:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)' },
            quick:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n²)'      },
        };

        // ==========================================================================
        // Initialization
        // ==========================================================================
        function init() {
            updateComplexityInfo();
            updateDelay();
            setupThemeToggle();
            generateArray();
        }

        function setupThemeToggle() {
            themeBtn.addEventListener('click', () => {
                const currentTheme = body.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    body.setAttribute('data-theme', 'light');
                    themeBtn.innerText = '🌙';
                } else {
                    body.setAttribute('data-theme', 'dark');
                    themeBtn.innerText = '☀️';
                }
            });
        }

        // ==========================================================================
        // Log Helpers
        // ==========================================================================
        function clearLog() {
            logContainer.innerHTML = '';
        }

        function appendLogEntry(opName, details) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-highlight">${opName}:</span> ${details}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // ==========================================================================
        // Bar Render Helpers (DOM)
        // ==========================================================================
        function setBarColor(index, colorClass) {
            if (bars[index]) bars[index].bar.className = `array-bar ${colorClass}`;
        }

        function setBarValue(index, height) {
            if (bars[index]) {
                bars[index].bar.style.height = `${height}%`;
                bars[index].valSpan.innerText = height;
            }
        }

        function updateStatsUI(comp, sw) {
            statsComp.innerText = comp;
            statsSwaps.innerText = sw;
        }

        function updateComplexityInfo() {
            const data = complexities[algorithmSelect.value];
            compBest.innerText = data.best;
            compAvg.innerText = data.avg;
            compWorst.innerText = data.worst;
        }

        function updateDelay() {
            const speed = parseInt(speedSlider.value);
            speedLabel.innerText = speed;
            delay = speed === 100 ? 2 : 1000 / Math.pow(speed, 1.2);
        }

        // ==========================================================================
        // Array Generation (builds DOM bars + triggers step recording)
        // ==========================================================================
        function generateArray() {
            // Stop any running auto-play
            clearTimeout(playTimer);
            appState = 'idle';

            const size = parseInt(sizeSlider.value);
            sizeLabel.innerText = size;
            array = [];
            bars = [];
            container.innerHTML = '';

            for (let i = 0; i < size; i++) {
                const value = Math.floor(Math.random() * 96) + 5;
                array.push(value);

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                const bar = document.createElement('div');
                bar.className = 'array-bar bar-default';
                bar.style.height = `${value}%`;

                const valSpan = document.createElement('span');
                valSpan.className = 'bar-value';
                valSpan.innerText = value;
                bar.appendChild(valSpan);

                const idxSpan = document.createElement('span');
                idxSpan.className = 'bar-index';
                idxSpan.innerText = i;

                wrapper.appendChild(bar);
                wrapper.appendChild(idxSpan);
                container.appendChild(wrapper);

                bars.push({ bar, valSpan });
            }

            reRecordSteps();
        }

        // ==========================================================================
        // Step Recording — pre-computes ALL visual states synchronously
        // ==========================================================================

        /**
         * Records one visual frame into the steps array.
         * @param {object} R - recorder state { arr, clrs, comp, sw }
         * @param {object|null} log - { opName, details } or null
         * @param {Array} steps - destination array
         */
        function snap(R, log, steps) {
            steps.push({
                values: [...R.arr],
                colors: [...R.clrs],
                comparisons: R.comp,
                swaps: R.sw,
                log: log
            });
        }

        // ---- Bubble Sort Recorder ----
        function _recBubble(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Bubble Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    // Highlight comparing
                    R.clrs[j] = 'bar-comparing';
                    R.clrs[j + 1] = 'bar-comparing';
                    snap(R, { opName: 'Compare', details: `Index [${j}] (${R.arr[j]}) with Index [${j+1}] (${R.arr[j+1]})` }, steps);

                    R.comp++;

                    if (isDesc ? R.arr[j] < R.arr[j + 1] : R.arr[j] > R.arr[j + 1]) {
                        let tmp = R.arr[j]; R.arr[j] = R.arr[j + 1]; R.arr[j + 1] = tmp;
                        R.clrs[j] = 'bar-swapping';
                        R.clrs[j + 1] = 'bar-swapping';
                        R.sw++;
                        snap(R, { opName: 'Swap', details: `Index [${j}] and Index [${j+1}]` }, steps);
                        swapped = true;
                    }

                    R.clrs[j] = 'bar-default';
                    R.clrs[j + 1] = 'bar-default';
                }
                R.clrs[n - i - 1] = 'bar-sorted';
                if (!swapped) {
                    for (let k = 0; k < n - i - 1; k++) R.clrs[k] = 'bar-sorted';
                    break;
                }
            }
            R.clrs[0] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Bubble Sort finished successfully.' }, steps);
        }

        // ---- Selection Sort Recorder ----
        function _recSelection(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Selection Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            for (let i = 0; i < n - 1; i++) {
                let minIdx = i;
                R.clrs[i] = 'bar-swapping';
                snap(R, { opName: 'Pass', details: `Iteration ${i}, assumed target at [${i}] (value: ${R.arr[i]})` }, steps);
                for (let j = i + 1; j < n; j++) {
                    R.clrs[j] = 'bar-comparing';
                    snap(R, null, steps);
                    R.comp++;
                    if (isDesc ? R.arr[j] > R.arr[minIdx] : R.arr[j] < R.arr[minIdx]) {
                        if (minIdx !== i) R.clrs[minIdx] = 'bar-default';
                        minIdx = j;
                        R.clrs[minIdx] = 'bar-swapping';
                        snap(R, { opName: 'New Target', details: `Found at index [${j}] (value: ${R.arr[j]})` }, steps);
                    } else {
                        R.clrs[j] = 'bar-default';
                    }
                }
                if (minIdx !== i) {
                    let tmp = R.arr[minIdx]; R.arr[minIdx] = R.arr[i]; R.arr[i] = tmp;
                    R.sw++;
                    snap(R, { opName: 'Swap', details: `Starting element [${i}] with target element [${minIdx}]` }, steps);
                }
                R.clrs[minIdx] = 'bar-default';
                R.clrs[i] = 'bar-sorted';
            }
            R.clrs[n - 1] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Selection Sort finished successfully.' }, steps);
        }

        // ---- Insertion Sort Recorder ----
        function _recInsertion(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Insertion Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            R.clrs[0] = 'bar-sorted';
            for (let i = 1; i < n; i++) {
                let key = R.arr[i];
                let j = i - 1;
                R.clrs[i] = 'bar-swapping';
                snap(R, { opName: 'Select', details: `Index [${i}] (value: ${key}) to insert into sorted sub-array` }, steps);
                while (j >= 0) {
                    R.clrs[j] = 'bar-comparing';
                    snap(R, null, steps);
                    R.comp++;
                    if (isDesc ? R.arr[j] < key : R.arr[j] > key) {
                        R.arr[j + 1] = R.arr[j];
                        R.sw++;
                        R.clrs[j + 1] = 'bar-swapping';
                        snap(R, { opName: 'Shift', details: `Moving index [${j}] (value: ${R.arr[j]}) to [${j+1}]` }, steps);
                        R.clrs[j + 1] = 'bar-sorted';
                        j--;
                    } else {
                        R.clrs[j] = 'bar-sorted';
                        break;
                    }
                }
                R.arr[j + 1] = key;
                R.clrs[j + 1] = 'bar-sorted';
                for (let k = 0; k <= i; k++) R.clrs[k] = 'bar-sorted';
                snap(R, { opName: 'Insert', details: `Key (${key}) placed at index [${j+1}]` }, steps);
            }
            snap(R, { opName: 'Complete', details: 'Insertion Sort finished successfully.' }, steps);
        }

        // ---- Merge Sort Recorder ----
        function _recMergeStep(R, l, m, r, steps, isDesc, totalLen) {
            const L = R.arr.slice(l, m + 1);
            const Rv = R.arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;
            snap(R, { opName: 'Merge Phase', details: `Subarrays Left [${l}-${m}] & Right [${m+1}-${r}]` }, steps);
            while (i < L.length && j < Rv.length) {
                R.clrs[l + i] = 'bar-comparing';
                R.clrs[m + 1 + j] = 'bar-comparing';
                snap(R, null, steps);
                R.comp++;
                const takeLeft = isDesc ? L[i] >= Rv[j] : L[i] <= Rv[j];
                if (takeLeft) { R.arr[k] = L[i]; i++; } else { R.arr[k] = Rv[j]; j++; }
                R.sw++;
                R.clrs[k] = 'bar-swapping';
                snap(R, { opName: 'Write', details: `Value ${R.arr[k]} into index [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                if (l + i < totalLen) R.clrs[l + i] = 'bar-default';
                if (m + 1 + j < totalLen) R.clrs[m + 1 + j] = 'bar-default';
                k++;
            }
            while (i < L.length) {
                R.arr[k] = L[i];
                R.clrs[k] = 'bar-swapping';
                R.sw++;
                snap(R, { opName: 'Copy', details: `Remaining Left element ${R.arr[k]} to [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                i++; k++;
            }
            while (j < Rv.length) {
                R.arr[k] = Rv[j];
                R.clrs[k] = 'bar-swapping';
                R.sw++;
                snap(R, { opName: 'Copy', details: `Remaining Right element ${R.arr[k]} to [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                j++; k++;
            }
        }

        function _recMergeHelper(R, l, r, steps, isDesc, totalLen) {
            if (l >= r) return;
            const m = l + Math.floor((r - l) / 2);
            _recMergeHelper(R, l, m, steps, isDesc, totalLen);
            _recMergeHelper(R, m + 1, r, steps, isDesc, totalLen);
            _recMergeStep(R, l, m, r, steps, isDesc, totalLen);
        }

        function _recMerge(R, steps, isDesc) {
            snap(R, { opName: 'Start', details: `Merge Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            _recMergeHelper(R, 0, R.arr.length - 1, steps, isDesc, R.arr.length);
            // Mark all sorted at end
            for (let i = 0; i < R.arr.length; i++) R.clrs[i] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Merge Sort finished successfully.' }, steps);
        }

        // ---- Quick Sort Recorder ----
        function _recQuickPartition(R, low, high, steps, isDesc) {
            const pivot = R.arr[high];
            R.clrs[high] = 'bar-pivot';
            snap(R, { opName: 'Partition', details: `Array [${low}-${high}], Pivot at [${high}] (value: ${pivot})` }, steps);
            let i = low - 1;
            for (let j = low; j <= high - 1; j++) {
                R.clrs[j] = 'bar-comparing';
                snap(R, null, steps);
                R.comp++;
                if (isDesc ? R.arr[j] > pivot : R.arr[j] < pivot) {
                    i++;
                    let tmp = R.arr[i]; R.arr[i] = R.arr[j]; R.arr[j] = tmp;
                    R.clrs[i] = 'bar-swapping';
                    R.clrs[j] = 'bar-swapping';
                    R.sw++;
                    snap(R, { opName: 'Swap', details: `Value ${R.arr[j]} ${isDesc ? '>' : '<'} pivot. Swapping [${i}] & [${j}]` }, steps);
                    R.clrs[i] = 'bar-default';
                }
                R.clrs[j] = 'bar-default';
            }
            let tmp = R.arr[i + 1]; R.arr[i + 1] = R.arr[high]; R.arr[high] = tmp;
            R.clrs[i + 1] = 'bar-sorted';
            R.clrs[high] = 'bar-default';
            R.sw++;
            snap(R, { opName: 'Place Pivot', details: `Pivot (${pivot}) moved to correct position [${i+1}]` }, steps);
            return i + 1;
        }

        function _recQuickHelper(R, low, high, steps, isDesc) {
            if (low < high) {
                const pi = _recQuickPartition(R, low, high, steps, isDesc);
                _recQuickHelper(R, low, pi - 1, steps, isDesc);
                _recQuickHelper(R, pi + 1, high, steps, isDesc);
            } else if (low >= 0 && low < R.arr.length) {
                R.clrs[low] = 'bar-sorted';
            }
        }

        function _recQuick(R, steps, isDesc) {
            snap(R, { opName: 'Start', details: `Quick Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            _recQuickHelper(R, 0, R.arr.length - 1, steps, isDesc);
            for (let i = 0; i < R.arr.length; i++) R.clrs[i] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Quick Sort finished successfully.' }, steps);
        }

        // ---- Main Recorder Entry Point ----
        function recordAlgorithmSteps(algo, sourceArray, isDesc) {
            const R = {
                arr: [...sourceArray],
                clrs: new Array(sourceArray.length).fill('bar-default'),
                comp: 0,
                sw: 0
            };
            const result = [];
            // Snap initial state (step 0, before any operation)
            snap(R, { opName: 'Ready', details: `Array of size ${sourceArray.length} loaded. Press Start or use ‹ › to step.` }, result);
            switch (algo) {
                case 'bubble':    _recBubble(R, result, isDesc);    break;
                case 'selection': _recSelection(R, result, isDesc); break;
                case 'insertion': _recInsertion(R, result, isDesc); break;
                case 'merge':     _recMerge(R, result, isDesc);     break;
                case 'quick':     _recQuick(R, result, isDesc);     break;
            }
            return result;
        }

        // ==========================================================================
        // Step Navigation & Rendering
        // ==========================================================================

        /** Re-computes steps for the current array/algo/order. Resets to step 0. */
        function reRecordSteps() {
            const algo = algorithmSelect.value;
            const isDesc = orderSelect.value === 'desc';
            steps = recordAlgorithmSteps(algo, array, isDesc);
            stepIndex = 0;
            renderStep(0);
            updateButtonStates();
        }

        /** Applies snapshot at idx to the DOM and log. */
        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Apply bar heights & colors
            for (let i = 0; i < bars.length; i++) {
                setBarValue(i, step.values[i]);
                setBarColor(i, step.colors[i]);
            }

            // Update stats
            updateStatsUI(step.comparisons, step.swaps);

            // Update log: replay from scratch (handles backward navigation correctly)
            clearLog();
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) appendLogEntry(steps[i].log.opName, steps[i].log.details);
            }

            stepIndex = idx;
        }

        /** Single source of truth for button states and labels. */
        function updateButtonStates() {
            const last = steps.length - 1;
            const atStart = stepIndex === 0;
            const atEnd = stepIndex === last;

            if (appState === 'playing') {
                sortBtn.innerText = 'Pause';
                sortBtn.disabled = false;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            } else if (appState === 'done') {
                sortBtn.innerText = 'Start Sorting!';
                sortBtn.disabled = false;
                prevBtn.disabled = atStart;
                nextBtn.disabled = true; // already at last step
            } else {
                // idle or paused
                sortBtn.innerText = appState === 'paused' ? 'Resume' : 'Start Sorting!';
                sortBtn.disabled = false;
                prevBtn.disabled = atStart;
                nextBtn.disabled = atEnd;
            }
        }

        // ==========================================================================
        // Auto-play Engine
        // ==========================================================================
        function playAuto() {
            appState = 'playing';
            updateButtonStates();

            function tick() {
                if (appState !== 'playing') return;
                const next = stepIndex + 1;
                if (next >= steps.length) {
                    // Reached the end
                    appState = 'done';
                    updateButtonStates();
                    return;
                }
                renderStep(next);
                if (next === steps.length - 1) {
                    appState = 'done';
                    updateButtonStates();
                } else {
                    playTimer = setTimeout(tick, delay);
                }
            }

            playTimer = setTimeout(tick, delay);
        }

        function pauseAuto() {
            clearTimeout(playTimer);
            appState = 'paused';
            updateButtonStates();
        }

        function togglePlay() {
            if (appState === 'playing') {
                pauseAuto();
            } else if (appState === 'paused') {
                playAuto();
            } else {
                // idle or done — restart from step 0 if done, else play from current
                if (appState === 'done') renderStep(0);
                playAuto();
            }
        }

        // ==========================================================================
        // Event Listeners
        // ==========================================================================
        generateBtn.addEventListener('click', generateArray);

        sizeSlider.addEventListener('input', () => {
            sizeLabel.innerText = sizeSlider.value;
            if (appState !== 'playing') generateArray();
        });

        speedSlider.addEventListener('input', updateDelay);

        algorithmSelect.addEventListener('change', () => {
            updateComplexityInfo();
            if (appState !== 'playing') {
                // Regenerate array for new algorithm (existing behaviour)
                generateArray();
            }
        });

        orderSelect.addEventListener('change', () => {
            if (appState !== 'playing') {
                // Re-record steps for same array but flipped order
                reRecordSteps();
            }
        });

        sortBtn.addEventListener('click', togglePlay);

        prevBtn.addEventListener('click', () => {
            if (stepIndex > 0) {
                renderStep(stepIndex - 1);
                updateButtonStates();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (stepIndex < steps.length - 1) {
                renderStep(stepIndex + 1);
                updateButtonStates();
            }
        });

        // Run setup on load
        window.onload = init;

    </script>
</body>
</html>
