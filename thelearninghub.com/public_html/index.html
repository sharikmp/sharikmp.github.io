<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sorting Algorithm Visualizer</title>
    <style>
        /* ==========================================================================
           CSS Configuration & Themes
           ========================================================================== */
        :root {
            /* Dark Theme (Premium Black/Gold) - Default */
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --surface-hover: #262626;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1d570;
            --accent-gold-dark: #aa8a29;
            --border-color: #333333;
            --log-bg: rgba(0, 0, 0, 0.3);
            
            /* Bar Status Colors */
            --bar-default: #404040;
            --bar-comparing: #e74c3c;
            --bar-swapping: #e67e22;
            --bar-sorted: #2ecc71;
            --bar-pivot: #9b59b6;
            
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        [data-theme="light"] {
            /* Light Theme (White/Dark Gold) */
            --bg-color: #f0f0f0;
            --surface-color: #ffffff;
            --surface-hover: #e8e8e8;
            --text-primary: #121212;
            --text-secondary: #555555;
            --accent-gold: #b8860b;
            --accent-gold-hover: #d4a017;
            --accent-gold-dark: #8b6508;
            --border-color: #cccccc;
            --log-bg: rgba(0, 0, 0, 0.05);
            
            /* Bar Status Colors */
            --bar-default: #b3b3b3;
            --bar-comparing: #e74c3c;
            --bar-swapping: #e67e22;
            --bar-sorted: #27ae60;
            --bar-pivot: #8e44ad;
        }

        /* ==========================================================================
           Reset & Base Styles
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden; /* Prevent body horizontal scroll */
        }

        /* ==========================================================================
           Layout & Header
           ========================================================================== */
        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent-gold);
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            padding: 0;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .theme-toggle:hover {
            border-color: var(--accent-gold);
        }

        /* ==========================================================================
           Main Content area & Panels
           ========================================================================== */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        /* Desktop Layout (50% Width each for Controls & Metrics) */
        @media(min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            /* background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px; */
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* ==========================================================================
           Controls inside Dashboard
           ========================================================================== */
        .controls-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem 0.5rem;
            align-items: end; /* Aligns inputs, selects, and buttons by their bottom edge */
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: center;
        }

        .control-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button, select {
            background-color: var(--surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            height: 32px; /* Fixed height to match inputs nicely */
        }

        button:hover, select:hover {
            border-color: var(--accent-gold);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
        }

        #sort-btn {
            background-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            font-size: 0.85rem;
        }

        #sort-btn:hover:not(:disabled) {
            background-color: var(--accent-gold-hover);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            padding: 0.5rem 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent-gold);
            margin-top: -5px;
            cursor: pointer;
        }

        /* ==========================================================================
           Algo Metrics Panel
           ========================================================================== */
        .algo-metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            text-align: center;
            height: 100%;
            align-items: center;
        }

        .algo-metric-item {
            background-color: var(--surface-hover);
            padding: 0.65rem 0.4rem 0.4rem;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        /* Info icon — click to open description modal */
        .info-icon {
            position: absolute;
            top: 5px;
            right: 6px;
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            font-size: 0.68rem;
            font-style: italic;
            font-family: Georgia, serif;
            font-weight: bold;
            color: var(--text-secondary);
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
            transition: border-color 0.15s, color 0.15s;
        }

        .info-icon:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .algo-metric-val {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.15;
        }

        .algo-metric-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Per-metric accent colors */
        .amc-red    { color: var(--bar-comparing); }
        .amc-orange { color: var(--bar-swapping); }
        .amc-gold   { color: var(--accent-gold); }

        /* ==========================================================================
           Metric Info Modal
           ========================================================================== */
        .metric-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 900;
        }

        .metric-modal-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 901;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-gold);
            border-radius: 10px;
            width: min(340px, 90vw);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: metricModalIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes metricModalIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.93); }
            to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .metric-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .metric-modal-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .metric-modal-close {
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            flex-shrink: 0;
        }

        .metric-modal-close:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .metric-modal-body {
            padding: 1rem;
            font-size: 0.83rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .metric-modal-backdrop.hidden,
        .metric-modal-box.hidden { display: none; }

        /* ==========================================================================
           Operation Log Panel
           ========================================================================== */
        .operation-log-panel {
            border: 1px solid var(--accent-gold-dark);
            border-left: 4px solid var(--accent-gold);
            padding: 0.5rem 0.75rem;
        }

        .log-container {
            height: 150px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-primary);
            padding: 0.4rem;
        }

        .log-entry {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 2px;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-highlight {
            color: var(--accent-gold);
            font-weight: bold;
            display: inline-block;
            min-width: 75px;
        }

        /* ==========================================================================
           Visualizer Canvas (Bars & Indices)
           ========================================================================== */
        .canvas-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            /* Handle Horizontal Overflow Gracefully */
            overflow-x: auto; 
            width: 100%;
        }

        #array-container {
            height: 30vh;
            min-height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding-bottom: 20px; /* Space for index numbers */
            /* Trick to center when small, but prevent left-cutoff when large */
            width: max-content;
            min-width: 100%;
            justify-content: center;
            margin: 0 auto;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            height: 100%;
            min-width: 28px; /* Ensure space for numbers */
            max-width: 40px; /* Cap the width of bars */
            flex-grow: 1;
        }

        .array-bar {
            width: 100%;
            border-radius: 3px 3px 0 0;
            transition: background-color 0.1s ease-in-out, height 0.1s ease-in-out;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
        }

        /* Value inside the bar */
        .bar-value {
            font-size: 0.65rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            font-family: var(--font-mono);
            writing-mode: horizontal-tb;
        }

        /* Index below the bar */
        .bar-index {
            position: absolute;
            bottom: -18px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        /* Color States */
        .bar-default { background-color: var(--bar-default) !important; }
        .bar-comparing { background-color: var(--bar-comparing) !important; }
        .bar-swapping { background-color: var(--bar-swapping) !important; }
        .bar-sorted { background-color: var(--bar-sorted) !important; }
        .bar-pivot { background-color: var(--bar-pivot) !important; }

        /* ==========================================================================
           Canvas Navigation (Prev/Next Step Buttons)
           ========================================================================== */
        .canvas-nav-wrapper {
            position: relative;
            width: 100%;
        }

        .nav-btn {
            position: absolute;
            top: 10px;
            z-index: 10;
            width: 36px;
            height: 36px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--accent-gold);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            opacity: 0.85;
        }

        .nav-btn-left  { left: 10px; }
        .nav-btn-right { right: 10px; }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent-gold);
            background: var(--surface-hover);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
            background: transparent !important;
        }

        /* Canvas takes full width of the wrapper */
        .canvas-nav-wrapper .canvas-container {
            width: 100%;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* ==========================================================================
           Learn Button & Algorithm Overlay
           ========================================================================== */

        body.overlay-open { overflow: hidden; }

        .learn-btn {
            width: auto;
            height: 32px;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0 0.85rem;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .learn-btn:hover {
            background: var(--accent-gold);
            color: #000;
        }

        .learn-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 1.5rem 1rem 2.5rem;
            overflow-y: auto;
        }

        .learn-overlay.hidden { display: none; }

        .learn-modal {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-gold);
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
            animation: learnModalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes learnModalIn {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        .learn-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            gap: 1rem;
        }

        .learn-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .learn-title-row h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            margin: 0;
        }

        .learn-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        .badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.18rem 0.55rem;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .badge-stable   { background: rgba(46,204,113,0.12); color: #2ecc71;              border: 1px solid rgba(46,204,113,0.35); }
        .badge-unstable { background: rgba(231,76,60,0.12);  color: #e74c3c;              border: 1px solid rgba(231,76,60,0.35);  }
        .badge-inplace  { background: rgba(212,175,55,0.12); color: var(--accent-gold);  border: 1px solid rgba(212,175,55,0.35); }
        .badge-extra    { background: rgba(155,89,182,0.12); color: #9b59b6;              border: 1px solid rgba(155,89,182,0.35); }

        .learn-close-btn {
            width: 34px;
            height: 34px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            padding: 0;
        }

        .learn-close-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .learn-modal-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .learn-tagline {
            font-size: 0.93rem;
            color: var(--text-secondary);
            line-height: 1.65;
            font-style: italic;
            margin: -0.75rem 0 0;
        }

        .learn-section-heading {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .learn-section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .learn-cx-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
        }

        @media(min-width: 480px) { .learn-cx-grid { grid-template-columns: repeat(4, 1fr); } }

        .learn-cx-card {
            background: var(--surface-hover);
            border-radius: 8px;
            padding: 0.7rem 0.5rem;
            text-align: center;
        }

        .learn-cx-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        .learn-cx-val {
            font-family: var(--font-mono);
            font-size: 0.88rem;
            font-weight: 700;
        }

        .learn-steps {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .learn-steps li {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-primary);
            line-height: 1.65;
        }

        .step-num {
            min-width: 22px;
            height: 22px;
            background: var(--accent-gold);
            color: #000;
            font-weight: 700;
            font-size: 0.68rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .learn-code-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .copy-btn {
            position: absolute;
            top: 0.65rem;
            right: 0.65rem;
            width: auto;
            height: auto;
            padding: 0.25rem 0.65rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 4px;
            color: #999;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 2;
            transition: all 0.2s;
            font-family: var(--font-main);
        }

        .copy-btn:hover { background: rgba(255,255,255,0.14); color: #fff; border-color: rgba(255,255,255,0.28); }
        .copy-btn.copied { color: #2ecc71; border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.08); }

        pre.learn-code {
            background: #0d0f12;
            margin: 0;
            padding: 2.75rem 1.25rem 1.25rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.75;
            color: #abb2bf;
        }

        /* Python syntax colours — One Dark inspired */
        .py-keyword { color: #c678dd; }
        .py-builtin  { color: #56b6c2; }
        .py-func    { color: #61afef; }
        .py-string  { color: #98c379; }
        .py-comment { color: #5c6370; font-style: italic; }
        .py-number  { color: #d19a66; }

        .learn-key-points { display: flex; flex-direction: column; gap: 0.55rem; }

        .key-point {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.7rem 0.9rem;
            border-radius: 6px;
            border-left: 3px solid;

    </style>
</head>

    <script>
        // ==========================================================================
        // JS Logic — Step-Recording Architecture
        // ==========================================================================

        // --- State Variables ---
        let array = [];           // current bar values (source of truth for recordings)
        let bars = [];            // DOM bar references
        let delay = 1000;         // ms between auto-play ticks

        // Step-recording state
        let steps = [];           // pre-computed snapshots
        let stepIndex = 0;        // current position within steps
        let appState = 'idle';    // 'idle' | 'playing' | 'paused' | 'done'
        let playTimer = null;     // setTimeout handle for auto-play

        // --- DOM Elements ---
        const container = document.getElementById('array-container');
        const sizeSlider = document.getElementById('size-slider');
        const speedSlider = document.getElementById('speed-slider');
        const orderSelect = document.getElementById('order-select');
        const generateBtn = document.getElementById('generate-btn');
        const sortBtn = document.getElementById('sort-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const algorithmSelect = document.getElementById('algorithm-select');
        const themeBtn = document.getElementById('theme-btn');
        const body = document.documentElement;

        // Stats & UI
        const statsComp = document.getElementById('stats-comparisons');
        const statsSwaps = document.getElementById('stats-swaps');
        const statsRuntime = document.getElementById('stats-runtime');
        const sizeLabel = document.getElementById('size-label');
        const speedLabel = document.getElementById('speed-label');
        const logContainer = document.getElementById('operation-log-container');

        // --- Complexity Data ---
        const complexities = {
            bubble:    { best: 'O(n)',       avg: 'O(n²)',      worst: 'O(n²)'      },
            selection: { best: 'O(n²)',      avg: 'O(n²)',      worst: 'O(n²)'      },
            insertion: { best: 'O(n)',       avg: 'O(n²)',      worst: 'O(n²)'      },
            merge:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)' },
            quick:     { best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n²)'      },
        };

        // ==========================================================================
        // Initialization
        // ==========================================================================
        function init() {
            updateDelay();
            setupThemeToggle();
            generateArray();
        }

        function setupThemeToggle() {
            themeBtn.addEventListener('click', () => {
                const currentTheme = body.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    body.setAttribute('data-theme', 'light');
                    themeBtn.innerText = '🌙';
                } else {
                    body.setAttribute('data-theme', 'dark');
                    themeBtn.innerText = '☀️';
                }
            });
        }

        // ==========================================================================
        // Log Helpers
        // ==========================================================================
        function clearLog() {
            logContainer.innerHTML = '';
        }

        function appendLogEntry(opName, details) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-highlight">${opName}:</span> ${details}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // ==========================================================================
        // Bar Render Helpers (DOM)
        // ==========================================================================
        function setBarColor(index, colorClass) {
            if (bars[index]) bars[index].bar.className = `array-bar ${colorClass}`;
        }

        function setBarValue(index, height) {
            if (bars[index]) {
                bars[index].bar.style.height = `${height}%`;
                bars[index].valSpan.innerText = height;
            }
        }

        function updateStatsUI(comp, sw) {
            statsComp.innerText = comp;
            statsSwaps.innerText = sw;
        }

        function updateDelay() {
            const speed = parseInt(speedSlider.value);
            speedLabel.innerText = speed;
            delay = speed === 100 ? 2 : 1000 / Math.pow(speed, 1.2);
        }

        // ==========================================================================
        // Array Generation (builds DOM bars + triggers step recording)
        // ==========================================================================
        function generateArray() {
            // Stop any running auto-play
            clearTimeout(playTimer);
            appState = 'idle';

            const size = parseInt(sizeSlider.value);
            sizeLabel.innerText = size;
            array = [];
            bars = [];
            container.innerHTML = '';

            for (let i = 0; i < size; i++) {
                const value = Math.floor(Math.random() * 96) + 5;
                array.push(value);

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                const bar = document.createElement('div');
                bar.className = 'array-bar bar-default';
                bar.style.height = `${value}%`;

                const valSpan = document.createElement('span');
                valSpan.className = 'bar-value';
                valSpan.innerText = value;
                bar.appendChild(valSpan);

                const idxSpan = document.createElement('span');
                idxSpan.className = 'bar-index';
                idxSpan.innerText = i;

                wrapper.appendChild(bar);
                wrapper.appendChild(idxSpan);
                container.appendChild(wrapper);

                bars.push({ bar, valSpan });
            }

            reRecordSteps();
        }

        // ==========================================================================
        // Step Recording — pre-computes ALL visual states synchronously
        // ==========================================================================

        /**
         * Records one visual frame into the steps array.
         * @param {object} R - recorder state { arr, clrs, comp, sw }
         * @param {object|null} log - { opName, details } or null
         * @param {Array} steps - destination array
         */
        function snap(R, log, steps) {
            steps.push({
                values: [...R.arr],
                colors: [...R.clrs],
                comparisons: R.comp,
                swaps: R.sw,
                log: log
            });
        }

        // ---- Bubble Sort Recorder ----
        function _recBubble(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Bubble Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    // Highlight comparing
                    R.clrs[j] = 'bar-comparing';
                    R.clrs[j + 1] = 'bar-comparing';
                    snap(R, { opName: 'Compare', details: `Index [${j}] (${R.arr[j]}) with Index [${j+1}] (${R.arr[j+1]})` }, steps);

                    R.comp++;

                    if (isDesc ? R.arr[j] < R.arr[j + 1] : R.arr[j] > R.arr[j + 1]) {
                        let tmp = R.arr[j]; R.arr[j] = R.arr[j + 1]; R.arr[j + 1] = tmp;
                        R.clrs[j] = 'bar-swapping';
                        R.clrs[j + 1] = 'bar-swapping';
                        R.sw++;
                        snap(R, { opName: 'Swap', details: `Index [${j}] and Index [${j+1}]` }, steps);
                        swapped = true;
                    }

                    R.clrs[j] = 'bar-default';
                    R.clrs[j + 1] = 'bar-default';
                }
                R.clrs[n - i - 1] = 'bar-sorted';
                if (!swapped) {
                    for (let k = 0; k < n - i - 1; k++) R.clrs[k] = 'bar-sorted';
                    break;
                }
            }
            R.clrs[0] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Bubble Sort finished successfully.' }, steps);
        }

        // ---- Selection Sort Recorder ----
        function _recSelection(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Selection Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            for (let i = 0; i < n - 1; i++) {
                let minIdx = i;
                R.clrs[i] = 'bar-swapping';
                snap(R, { opName: 'Pass', details: `Iteration ${i}, assumed target at [${i}] (value: ${R.arr[i]})` }, steps);
                for (let j = i + 1; j < n; j++) {
                    R.clrs[j] = 'bar-comparing';
                    snap(R, null, steps);
                    R.comp++;
                    if (isDesc ? R.arr[j] > R.arr[minIdx] : R.arr[j] < R.arr[minIdx]) {
                        if (minIdx !== i) R.clrs[minIdx] = 'bar-default';
                        minIdx = j;
                        R.clrs[minIdx] = 'bar-swapping';
                        snap(R, { opName: 'New Target', details: `Found at index [${j}] (value: ${R.arr[j]})` }, steps);
                    } else {
                        R.clrs[j] = 'bar-default';
                    }
                }
                if (minIdx !== i) {
                    let tmp = R.arr[minIdx]; R.arr[minIdx] = R.arr[i]; R.arr[i] = tmp;
                    R.sw++;
                    snap(R, { opName: 'Swap', details: `Starting element [${i}] with target element [${minIdx}]` }, steps);
                }
                R.clrs[minIdx] = 'bar-default';
                R.clrs[i] = 'bar-sorted';
            }
            R.clrs[n - 1] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Selection Sort finished successfully.' }, steps);
        }

        // ---- Insertion Sort Recorder ----
        function _recInsertion(R, steps, isDesc) {
            const n = R.arr.length;
            snap(R, { opName: 'Start', details: `Insertion Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            R.clrs[0] = 'bar-sorted';
            for (let i = 1; i < n; i++) {
                let key = R.arr[i];
                let j = i - 1;
                R.clrs[i] = 'bar-swapping';
                snap(R, { opName: 'Select', details: `Index [${i}] (value: ${key}) to insert into sorted sub-array` }, steps);
                while (j >= 0) {
                    R.clrs[j] = 'bar-comparing';
                    snap(R, null, steps);
                    R.comp++;
                    if (isDesc ? R.arr[j] < key : R.arr[j] > key) {
                        R.arr[j + 1] = R.arr[j];
                        R.sw++;
                        R.clrs[j + 1] = 'bar-swapping';
                        snap(R, { opName: 'Shift', details: `Moving index [${j}] (value: ${R.arr[j]}) to [${j+1}]` }, steps);
                        R.clrs[j + 1] = 'bar-sorted';
                        j--;
                    } else {
                        R.clrs[j] = 'bar-sorted';
                        break;
                    }
                }
                R.arr[j + 1] = key;
                R.clrs[j + 1] = 'bar-sorted';
                for (let k = 0; k <= i; k++) R.clrs[k] = 'bar-sorted';
                snap(R, { opName: 'Insert', details: `Key (${key}) placed at index [${j+1}]` }, steps);
            }
            snap(R, { opName: 'Complete', details: 'Insertion Sort finished successfully.' }, steps);
        }

        // ---- Merge Sort Recorder ----
        function _recMergeStep(R, l, m, r, steps, isDesc, totalLen) {
            const L = R.arr.slice(l, m + 1);
            const Rv = R.arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;
            snap(R, { opName: 'Merge Phase', details: `Subarrays Left [${l}-${m}] & Right [${m+1}-${r}]` }, steps);
            while (i < L.length && j < Rv.length) {
                R.clrs[l + i] = 'bar-comparing';
                R.clrs[m + 1 + j] = 'bar-comparing';
                snap(R, null, steps);
                R.comp++;
                const takeLeft = isDesc ? L[i] >= Rv[j] : L[i] <= Rv[j];
                if (takeLeft) { R.arr[k] = L[i]; i++; } else { R.arr[k] = Rv[j]; j++; }
                R.sw++;
                R.clrs[k] = 'bar-swapping';
                snap(R, { opName: 'Write', details: `Value ${R.arr[k]} into index [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                if (l + i < totalLen) R.clrs[l + i] = 'bar-default';
                if (m + 1 + j < totalLen) R.clrs[m + 1 + j] = 'bar-default';
                k++;
            }
            while (i < L.length) {
                R.arr[k] = L[i];
                R.clrs[k] = 'bar-swapping';
                R.sw++;
                snap(R, { opName: 'Copy', details: `Remaining Left element ${R.arr[k]} to [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                i++; k++;
            }
            while (j < Rv.length) {
                R.arr[k] = Rv[j];
                R.clrs[k] = 'bar-swapping';
                R.sw++;
                snap(R, { opName: 'Copy', details: `Remaining Right element ${R.arr[k]} to [${k}]` }, steps);
                R.clrs[k] = (r - l === totalLen - 1) ? 'bar-sorted' : 'bar-default';
                j++; k++;
            }
        }

        function _recMergeHelper(R, l, r, steps, isDesc, totalLen) {
            if (l >= r) return;
            const m = l + Math.floor((r - l) / 2);
            _recMergeHelper(R, l, m, steps, isDesc, totalLen);
            _recMergeHelper(R, m + 1, r, steps, isDesc, totalLen);
            _recMergeStep(R, l, m, r, steps, isDesc, totalLen);
        }

        function _recMerge(R, steps, isDesc) {
            snap(R, { opName: 'Start', details: `Merge Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            _recMergeHelper(R, 0, R.arr.length - 1, steps, isDesc, R.arr.length);
            // Mark all sorted at end
            for (let i = 0; i < R.arr.length; i++) R.clrs[i] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Merge Sort finished successfully.' }, steps);
        }

        // ---- Quick Sort Recorder ----
        function _recQuickPartition(R, low, high, steps, isDesc) {
            const pivot = R.arr[high];
            R.clrs[high] = 'bar-pivot';
            snap(R, { opName: 'Partition', details: `Array [${low}-${high}], Pivot at [${high}] (value: ${pivot})` }, steps);
            let i = low - 1;
            for (let j = low; j <= high - 1; j++) {
                R.clrs[j] = 'bar-comparing';
                snap(R, null, steps);
                R.comp++;
                if (isDesc ? R.arr[j] > pivot : R.arr[j] < pivot) {
                    i++;
                    let tmp = R.arr[i]; R.arr[i] = R.arr[j]; R.arr[j] = tmp;
                    R.clrs[i] = 'bar-swapping';
                    R.clrs[j] = 'bar-swapping';
                    R.sw++;
                    snap(R, { opName: 'Swap', details: `Value ${R.arr[j]} ${isDesc ? '>' : '<'} pivot. Swapping [${i}] & [${j}]` }, steps);
                    R.clrs[i] = 'bar-default';
                }
                R.clrs[j] = 'bar-default';
            }
            let tmp = R.arr[i + 1]; R.arr[i + 1] = R.arr[high]; R.arr[high] = tmp;
            R.clrs[i + 1] = 'bar-sorted';
            R.clrs[high] = 'bar-default';
            R.sw++;
            snap(R, { opName: 'Place Pivot', details: `Pivot (${pivot}) moved to correct position [${i+1}]` }, steps);
            return i + 1;
        }

        function _recQuickHelper(R, low, high, steps, isDesc) {
            if (low < high) {
                const pi = _recQuickPartition(R, low, high, steps, isDesc);
                _recQuickHelper(R, low, pi - 1, steps, isDesc);
                _recQuickHelper(R, pi + 1, high, steps, isDesc);
            } else if (low >= 0 && low < R.arr.length) {
                R.clrs[low] = 'bar-sorted';
            }
        }

        function _recQuick(R, steps, isDesc) {
            snap(R, { opName: 'Start', details: `Quick Sort Initiated (${isDesc ? 'Descending' : 'Ascending'})` }, steps);
            _recQuickHelper(R, 0, R.arr.length - 1, steps, isDesc);
            for (let i = 0; i < R.arr.length; i++) R.clrs[i] = 'bar-sorted';
            snap(R, { opName: 'Complete', details: 'Quick Sort finished successfully.' }, steps);
        }

        // ---- Main Recorder Entry Point ----
        function recordAlgorithmSteps(algo, sourceArray, isDesc) {
            const R = {
                arr: [...sourceArray],
                clrs: new Array(sourceArray.length).fill('bar-default'),
                comp: 0,
                sw: 0
            };
            const result = [];
            // Snap initial state (step 0, before any operation)
            snap(R, { opName: 'Ready', details: `Array of size ${sourceArray.length} loaded. Press Start or use ‹ › to step.` }, result);
            const _t0 = performance.now();
            switch (algo) {
                case 'bubble':    _recBubble(R, result, isDesc);    break;
                case 'selection': _recSelection(R, result, isDesc); break;
                case 'insertion': _recInsertion(R, result, isDesc); break;
                case 'merge':     _recMerge(R, result, isDesc);     break;
                case 'quick':     _recQuick(R, result, isDesc);     break;
            }
            result.runTimeMs = Math.round((performance.now() - _t0) * 100) / 100;
            return result;
        }

        // ==========================================================================
        // Step Navigation & Rendering
        // ==========================================================================

        /** Re-computes steps for the current array/algo/order. Resets to step 0. */
        function reRecordSteps() {
            const algo = algorithmSelect.value;
            const isDesc = orderSelect.value === 'desc';
            steps = recordAlgorithmSteps(algo, array, isDesc);
            statsRuntime.innerText = steps.runTimeMs;
            stepIndex = 0;
            renderStep(0);
            updateButtonStates();
        }

        /** Applies snapshot at idx to the DOM and log. */
        function renderStep(idx) {
            const step = steps[idx];
            if (!step) return;

            // Apply bar heights & colors
            for (let i = 0; i < bars.length; i++) {
                setBarValue(i, step.values[i]);
                setBarColor(i, step.colors[i]);
            }

            // Update stats
            updateStatsUI(step.comparisons, step.swaps);

            // Update log: replay from scratch (handles backward navigation correctly)
            clearLog();
            for (let i = 0; i <= idx; i++) {
                if (steps[i].log) appendLogEntry(steps[i].log.opName, steps[i].log.details);
            }

            stepIndex = idx;
        }

        /** Single source of truth for button states and labels. */
        function updateButtonStates() {
            const last = steps.length - 1;
            const atStart = stepIndex === 0;
            const atEnd = stepIndex === last;

            if (appState === 'playing') {
                sortBtn.innerText = 'Pause';
                sortBtn.disabled = false;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            } else if (appState === 'done') {
                sortBtn.innerText = 'Start Sorting!';
                sortBtn.disabled = false;
                prevBtn.disabled = atStart;
                nextBtn.disabled = true; // already at last step
            } else {
                // idle or paused
                sortBtn.innerText = appState === 'paused' ? 'Resume' : 'Start Sorting!';
                sortBtn.disabled = false;
                prevBtn.disabled = atStart;
                nextBtn.disabled = atEnd;
            }
        }

        // ==========================================================================
        // Auto-play Engine
        // ==========================================================================
        function playAuto() {
            appState = 'playing';
            updateButtonStates();

            function tick() {
                if (appState !== 'playing') return;
                const next = stepIndex + 1;
                if (next >= steps.length) {
                    // Reached the end
                    appState = 'done';
                    updateButtonStates();
                    return;
                }
                renderStep(next);
                if (next === steps.length - 1) {
                    appState = 'done';
                    updateButtonStates();
                } else {
                    playTimer = setTimeout(tick, delay);
                }
            }

            playTimer = setTimeout(tick, delay);
        }

        function pauseAuto() {
            clearTimeout(playTimer);
            appState = 'paused';
            updateButtonStates();
        }

        function togglePlay() {
            if (appState === 'playing') {
                pauseAuto();
            } else if (appState === 'paused') {
                playAuto();
            } else {
                // idle or done — restart from step 0 if done, else play from current
                if (appState === 'done') renderStep(0);
                playAuto();
            }
        }

        // ==========================================================================
        // Event Listeners
        // ==========================================================================
        generateBtn.addEventListener('click', generateArray);

        sizeSlider.addEventListener('input', () => {
            sizeLabel.innerText = sizeSlider.value;
            if (appState !== 'playing') generateArray();
        });

        speedSlider.addEventListener('input', updateDelay);

        algorithmSelect.addEventListener('change', () => {
            if (appState !== 'playing') {
                // Regenerate array for new algorithm (existing behaviour)
                generateArray();
            }
        });

        orderSelect.addEventListener('change', () => {
            if (appState !== 'playing') {
                // Re-record steps for same array but flipped order
                reRecordSteps();
            }
        });

        sortBtn.addEventListener('click', togglePlay);

        prevBtn.addEventListener('click', () => {
            if (stepIndex > 0) {
                renderStep(stepIndex - 1);
                updateButtonStates();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (stepIndex < steps.length - 1) {
                renderStep(stepIndex + 1);
                updateButtonStates();
            }
        });

        // ==========================================================================
        // Learn Overlay — Content Data, Highlighter & Events
        // ==========================================================================

        const learnData = {

    n = len(arr)
    for i in range(n - 1):

# Example

    for i in range(1, len(arr)):
        key = arr[i]  # Element to be inserted
        j = i - 1
        # Shift elements greater than key one step right
        while j >= 0 and arr[j] > key:
            arr[j + 1] = arr[j]
            j -= 1
        arr[j + 1] = key  # Drop key into the gap
    return arr

# Example
data = [64, 34, 25, 12, 22, 11, 90]
print(insertion_sort(data))  # [11, 12, 22, 25, 34, 64, 90]`,

                code: `def merge_sort(arr):
    if len(arr) <= 1:
        return arr  # Base case
    mid   = len(arr) // 2
    left  = merge_sort(arr[:mid])
    right = merge_sort(arr[mid:])
    return merge(left, right)

def merge(left, right):
    result = []
    i = j = 0
    while i < len(left) and j < len(right):
        if left[i] <= right[j]:
            result.append(left[i]); i += 1
        else:
            result.append(right[j]); j += 1
    result.extend(left[i:])
    result.extend(right[j:])
    return result

# Example
data = [64, 34, 25, 12, 22, 11, 90]
print(merge_sort(data))  # [11, 12, 22, 25, 34, 64, 90]`,

                    { type: 'key',  text: 'Recursion depth is O(log n) — for n = 1,000,000 that is only ~20 stack frames.' },
                    { type: 'tip',  text: 'Foundation of <strong>external sort</strong> — sorting datasets too large for RAM by merging sorted file chunks.' },
                    { type: 'good', text: 'Python’s built-in <strong>Timsort</strong> is a hybrid of Merge Sort + Insertion Sort — a direct endorsement of its reliability.' }

                    'The pivot is now in its <strong>final correct position</strong> — it will never move again.',
                    'Recursively apply quick_sort to the left sub-array (elements &lt; pivot).',

    if high is None:
        high = len(arr) - 1
    if low < high:
        pi = partition(arr, low, high)
        quick_sort(arr, low, pi - 1)   # Sort left of pivot
        quick_sort(arr, pi + 1, high)  # Sort right of pivot
    return arr

def partition(arr, low, high):
    pivot = arr[high]  # Last element as pivot
    i = low - 1        # Pointer for smaller partition
    for j in range(low, high):
        if arr[j] < pivot:
            i += 1
            arr[i], arr[j] = arr[j], arr[i]
    # Place pivot in its correct sorted position
    arr[i + 1], arr[high] = arr[high], arr[i + 1]
    return i + 1

# Example
data = [64, 34, 25, 12, 22, 11, 90]
print(quick_sort(data))  # [11, 12, 22, 25, 34, 64, 90]`,

        // Simple Python syntax highlighter (no external dependencies)
        function highlightPython(rawCode) {
            const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            let code = esc(rawCode);
            const saved = [];
            const save  = html => { saved.push(html); return `\x00${saved.length - 1}\x00`; };

            // 1. Comments  (#...)
            code = code.replace(/#[^\n]*/g, m => save(`<span class="py-comment">${m}</span>`));

            // 2. Strings  ('...' or "...")
            code = code.replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*")/g,
                m => save(`<span class="py-string">${m}</span>`));

            // 3a. def/class name — highlight function name in blue
            code = code.replace(/\bdef\s+(\w+)/g, (_, n) =>
                save(`<span class="py-keyword">def</span> <span class="py-func">${n}</span>`));

            // 3b. Other keywords
            ['class','return','if','else','elif','for','while','in','not','and','or',
             'is','break','continue','import','from','pass','True','False','None',
             'lambda','yield','with','as','try','except','finally','raise'
            ].forEach(kw => code = code.replace(new RegExp(`\\b${kw}\\b`, 'g'),
                () => save(`<span class="py-keyword">${kw}</span>`)));

            // 4. Builtins
            ['len','range','print','append','extend','sorted','list','int','str','float'
            ].forEach(bt => code = code.replace(new RegExp(`\\b${bt}\\b`, 'g'),
                () => save(`<span class="py-builtin">${bt}</span>`)));

            // 5. Numbers
            code = code.replace(/\b(\d+)\b/g, m => save(`<span class="py-number">${m}</span>`));

            // 6. Restore
            code = code.replace(/\x00(\d+)\x00/g, (_, i) => saved[+i]);
            return code;
        }
