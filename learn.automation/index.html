<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Learning Lab - Practice Topics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #10172a 50%, #0d1117 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            background: linear-gradient(135deg, #00d9ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            font-size: 1.5rem;
        }

        /* Main Container */
        .main-container {
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d9ff 0%, #22d3ee 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .header-section p {
            font-size: 1.2rem;
            color: #22d3ee;
            text-shadow: 0 2px 8px rgba(34, 211, 238, 0.2);
        }

        .header-divider {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00d9ff, transparent);
            margin: 20px auto;
            border-radius: 2px;
        }

        /* Topics Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Topic Card */
        .topic-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .topic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d9ff, transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .topic-card:hover::before {
            opacity: 1;
        }

        .topic-card:hover {
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(30, 58, 138, 0.15);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.15), inset 0 0 20px rgba(0, 217, 255, 0.05);
            transform: translateY(-5px);
        }

        .topic-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d9ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            width: fit-content;
        }

        .topic-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #00d9ff;
            letter-spacing: 0.5px;
        }

        .topic-card p {
            font-size: 0.95rem;
            color: #b0b0b0;
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .card-arrow {
            color: #22d3ee;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            align-self: flex-end;
        }

        .topic-card:hover .card-arrow {
            transform: translateX(5px);
        }

        /* Footer */
        footer {
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid rgba(0, 217, 255, 0.2);
            padding: 30px 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        footer a {
            color: #00d9ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #22d3ee;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: A4 landscape;
                margin: 15mm;
            }

            body {
                background: linear-gradient(135deg, #0a0e27 0%, #10172a 50%, #0d1117 100%) !important;
                padding: 0;
                margin: 0;
                font-size: 11pt;
            }

            .navbar {
                display: none;
            }

            .main-container {
                padding: 20px;
                max-width: 100%;
            }

            .header-section {
                page-break-after: avoid;
                margin-bottom: 20px;
            }

            .header-section h1 {
                font-size: 2.2rem;
                margin-bottom: 10px;
            }

            .header-section p {
                font-size: 1rem;
                margin-bottom: 10px;
            }

            .header-divider {
                margin: 10px auto;
            }

            .topics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                margin-bottom: 20px;
            }

            .topic-card {
                padding: 16px;
                page-break-inside: avoid;
                min-height: auto;
                font-size: 9pt;
            }

            .topic-card h3 {
                font-size: 1.1rem;
                margin-bottom: 8px;
            }

            .topic-card p {
                font-size: 0.9rem;
                margin-bottom: 8px;
                line-height: 1.4;
            }

            .topic-icon {
                font-size: 2rem;
                margin-bottom: 8px;
            }

            .card-arrow {
                display: none;
            }

            footer {
                display: none;
            }

            /* Page break optimization */
            .topics-grid::after {
                content: '';
                display: block;
                page-break-after: always;
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .topics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .header-section h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 640px) {
            .topics-grid {
                grid-template-columns: 1fr;
            }

            .header-section h1 {
                font-size: 1.8rem;
            }

            .main-container {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="navbar-brand">
                <i class="fas fa-robot"></i> Automation Lab
            </div>
            <div class="space-x-6 hidden sm:flex">
                <a href="#" class="hover:text-cyan-400 transition-colors">Topics</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Practice</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Header -->
        <div class="header-section">
            <h1>🚀 Automation Practice Topics</h1>
            <div class="header-divider"></div>
            <p>Master web automation with hands-on practice scenarios</p>
        </div>

        <!-- Topics Container -->
        <div id="topics-container" class="topics-grid"></div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2025 Automation Learning Lab • <a href="#">Privacy</a> • <a href="#">Terms</a>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const topicsData = [
                {
                    title: 'Login & Authentication',
                    url: 'login.html',
                    description: 'Practice logging in and verifying valid and invalid credentials.',
                    icon: 'fas fa-sign-in-alt'
                },
                {
                    title: 'Click & Form Filling',
                    url: 'locators.html',
                    description: 'Master filling complex forms, handling different input types, and submissions.',
                    icon: 'fas fa-mouse'
                },
                {
                    title: 'Dropdowns & Radio Buttons',
                    url: 'dropdowns.html',
                    description: 'Learn dropdown selection, radio buttons, and checkboxes interaction.',
                    icon: 'fas fa-list'
                },
                {
                    title: 'Alerts & Pop-ups',
                    url: 'alerts-cookies.html',
                    description: 'Handle browser dialogs, modal pop-ups, and native alerts gracefully.',
                    icon: 'fas fa-exclamation-circle'
                },
                {
                    title: 'Iframes',
                    url: 'iframes.html',
                    description: 'Navigate and automate forms inside single and nested iframes.',
                    icon: 'fas fa-window-restore'
                },
                {
                    title: 'File Upload & Download',
                    url: 'uploads-new-tabs-windows.html',
                    description: 'Practice uploading files and verifying file downloads.',
                    icon: 'fas fa-file-upload'
                },
                {
                    title: 'Drag and Drop',
                    url: 'drag-drop.html',
                    description: 'Master drag and drop interactions on web applications.',
                    icon: 'fas fa-arrows-alt'
                },
            ];

            const topicsContainer = document.getElementById('topics-container');

            topicsData.forEach(topic => {
                const topicCard = document.createElement('a');
                topicCard.href = topic.url;
                topicCard.className = 'topic-card';

                const icon = document.createElement('div');
                icon.className = 'topic-icon';
                icon.innerHTML = `<i class="${topic.icon}"></i>`;

                const title = document.createElement('h3');
                title.textContent = topic.title;

                const description = document.createElement('p');
                description.textContent = topic.description;

                const arrow = document.createElement('div');
                arrow.className = 'card-arrow';
                arrow.innerHTML = '<i class="fas fa-arrow-right"></i>';

                topicCard.appendChild(icon);
                topicCard.appendChild(title);
                topicCard.appendChild(description);
                topicCard.appendChild(arrow);

                topicsContainer.appendChild(topicCard);
            });
        });
    </script>

</body>
</html>
