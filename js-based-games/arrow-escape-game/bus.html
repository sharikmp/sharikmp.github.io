<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Escape</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --bg-color: #1e293b;
            --error-color: #ef4444;
            --ui-bg: rgba(15, 23, 42, 0.95);
            --primary: #3b82f6;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier Prime', monospace;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-image: radial-gradient(circle at 50% 50%, #334155 0%, #0f172a 100%);
        }

        /* Header / Timer */
        #header {
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        #timer {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #timer.warning {
            color: var(--error-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }

        /* Game Grid Container */
        #game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        #grid {
            display: grid;
            gap: 2px;
            position: relative;
        }

        .cell {
            position: relative;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        /* Bus Styles */
        .bus-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 1;
            /* Add variables for rotation and scale to keep orientation during animations */
            --rot: 0deg;
            --scl: 1;
            transform: rotate(var(--rot)) scaleX(var(--scl));
        }

        .bus-canvas {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: block;
        }

        .bus-wrapper:hover {
            z-index: 10;
        }

        .bus-wrapper:hover .bus-canvas {
            transform: scale(1.35);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }

        /* Orientations: Base drawing faces LEFT */
        .dir-L { --rot: 0deg; --scl: 1; }
        .dir-U { --rot: 90deg; --scl: 1; }
        .dir-R { --rot: 0deg; --scl: -1; } /* Flip horizontally instead of rotating 180deg */
        .dir-D { --rot: -90deg; --scl: 1; }

        /* Animations */
        .shake {
            animation: vibrate 0.25s linear both;
        }

        .shake .bus-canvas {
            filter: sepia(1) hue-rotate(-50deg) saturate(5) drop-shadow(0 0 5px red);
        }

        @keyframes vibrate {
            /* Preserve the bus orientation while translating */
            0%, 100% { transform: translate(0, 0) rotate(var(--rot)) scaleX(var(--scl)); }
            20% { transform: translate(-3px, 0px) rotate(var(--rot)) scaleX(var(--scl)); }
            40% { transform: translate(3px, -2px) rotate(var(--rot)) scaleX(var(--scl)); }
            60% { transform: translate(-3px, 2px) rotate(var(--rot)) scaleX(var(--scl)); }
            80% { transform: translate(3px, 0px) rotate(var(--rot)) scaleX(var(--scl)); }
        }

        .flying {
            z-index: 1000 !important;
            pointer-events: none;
            /* Keep rotational transform and add transition for layout movement */
            transition: top 0.5s cubic-bezier(0.5, 0, 1, 0.5), left 0.5s cubic-bezier(0.5, 0, 1, 0.5);
        }

        .flying .bus-canvas {
            transform: scale(1.5);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--ui-bg);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        button {
            background: #f8fafc;
            color: #0f172a;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1.2rem;
            font-family: inherit;
            border: 2px solid #475569;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        /* Leaderboard Table */
        .leaderboard-container {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            max-height: 50vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #1e293b;
        }

        th {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        td.time-col {
            text-align: right;
            color: #38bdf8;
            font-weight: bold;
        }

        tr.highlight {
            background: rgba(56, 189, 248, 0.15);
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div id="header">
        <span id="timer">60.0s</span>
    </div>

    <div id="game-area">
        <div id="grid"></div>
    </div>

    <div id="start-modal" class="modal-overlay">
        <h1>Bus Escape</h1>
        <p>Tap buses to start their engines and release them.<br>A bus can only drive out if its path is clear to the edge.<br>Clear the traffic jam before time runs out!</p>
        <button onclick="startGame()">PLAY GAME</button>
        <button onclick="showLeaderboardModal()" style="background: #334155; color: white;">LEADERBOARD</button>
    </div>

    <div id="lose-modal" class="modal-overlay hidden">
        <h1 style="color: var(--error-color)">Traffic Jam!</h1>
        <p>You didn't clear the board in time.</p>
        <button onclick="resetToStart()">TRY AGAIN</button>
    </div>

    <div id="win-modal" class="modal-overlay hidden">
        <h1 style="color: #38bdf8">Roads Cleared!</h1>
        <p>Time: <span id="win-time"></span> seconds</p>
        <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" autocomplete="off">
        <button class="primary" onclick="submitScore()">SUBMIT SCORE</button>
    </div>

    <div id="leaderboard-modal" class="modal-overlay hidden">
        <h1>Top 10 Drivers</h1>
        <div class="leaderboard-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th style="text-align: right;">Time (s)</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                </tbody>
            </table>
        </div>
        <button onclick="resetToStart()">MAIN MENU</button>
    </div>

    <script>
        // --- GAME CONFIGURATION ---
        // Reduced columns/rows slightly to make the cartoon buses visible and pleasant
        const COLS = 12; 
        const ROWS = 16; 
        const TOTAL_TIME = 60; 
        const DENSITY = 0.85; 

        // --- THEMES ---
        const busThemes = [
            { main: '#FFD700', dark: '#E6B800', light: '#FFE44D', window: '#A0E4FF', grill: '#334155' }, // Yellow
            { main: '#4ade80', dark: '#16a34a', light: '#86efac', window: '#ecfeff', grill: '#1e293b' }, // Mint
            { main: '#60a5fa', dark: '#2563eb', light: '#93c5fd', window: '#f0f9ff', grill: '#1e293b' }, // Blue
            { main: '#f87171', dark: '#dc2626', light: '#fca5a5', window: '#fff1f2', grill: '#450a0a' }, // Red
            { main: '#a855f7', dark: '#7e22ce', light: '#c084fc', window: '#faf5ff', grill: '#3b0764' }  // Purple
        ];

        // --- REUSABLE BUS CLASS ---
        class CartoonBus {
            constructor(canvas, themeIndex) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.theme = busThemes[themeIndex % busThemes.length];
                this.isEngineOn = false;
                this.speed = 0;
                this.wheelRotation = 0;
                this.particles = [];
                this.animationId = null;

                // Bind methods to maintain context
                this.loop = this.loop.bind(this);
            }

            startEngine() {
                this.isEngineOn = true;
                this.speed = 1.5; // Faster wheel spin for escaping
                this.loop();
            }

            stopEngine() {
                this.isEngineOn = false;
                this.speed = 0;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            loop() {
                this.draw();
                if (this.isEngineOn || this.particles.length > 0) {
                    this.animationId = requestAnimationFrame(this.loop);
                }
            }

            draw() {
                const ctx = this.ctx;
                const canvas = this.canvas;
                const dpr = window.devicePixelRatio || 1;

                const w = 180;
                const h = 100;

                // 3D top-view config: tvH = how many px of roof are visible above body
                // tvX = how much the far (rear) corners shift inward for perspective
                const tvH = 32;
                const tvX = 5;

                // Scale to fit canvas including front overhang (25px) and roof (tvH)
                const scale = Math.min(canvas.width / dpr / 225, canvas.height / dpr / 175);

                const centerX = (canvas.width / dpr) / 2;
                const centerY = (canvas.height / dpr) / 2;

                // Engine Physics
                const time = Date.now() / 1000;
                const bounce = this.isEngineOn ? Math.sin(time * 25) * 3 : 0;
                this.wheelRotation -= this.speed * 0.4;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.scale(dpr, dpr);
                ctx.translate(centerX, centerY + bounce * scale);
                ctx.scale(scale, scale);

                // Coordinate aliases — bus faces LEFT, front is on the left
                const front  = -w/2 - 25;  // front bumper X  (-115)
                const bodyL  = -w/2;        // body left X      (-90)
                const bodyR  =  w/2;        // body right X     (+90)
                const bodyT  = -h/2;        // body top Y       (-50)
                const bodyB  =  h/2;        // body bottom Y    (+50)

                // Roof "far" edge (the edge you see from above, going back into perspective)
                const rfY      = bodyT - tvH;       //  -82
                const rfFrontX = front  - tvX;      // -120  (front-far corner)
                const rfRearX  = bodyR  - tvX;      //  +85  (rear-far corner)

                // 1. Shadow
                ctx.beginPath();
                ctx.ellipse(10, bodyB + 15, 80 + (this.isEngineOn ? 5 : 0), 14, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.fill();

                // 2. Rear face — dark sliver on the right edge for 3D depth
                ctx.globalAlpha = 0.45;
                ctx.fillStyle = this.theme.dark;
                ctx.beginPath();
                ctx.moveTo(bodyR,    bodyT);
                ctx.lineTo(rfRearX,  rfY);
                ctx.lineTo(rfRearX,  rfY + h);
                ctx.lineTo(bodyR,    bodyB);
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // 3. Wheels Back
                this.drawWheel(-45, bodyB + 5, 20, this.wheelRotation);
                this.drawWheel(45,  bodyB + 5, 20, this.wheelRotation);

                // 4. Body Side (main visible face)
                const mainGrad = ctx.createLinearGradient(0, bodyT, 0, bodyB);
                mainGrad.addColorStop(0, this.theme.main);
                mainGrad.addColorStop(1, this.theme.dark);
                ctx.fillStyle = mainGrad;
                ctx.beginPath();
                ctx.roundRect(bodyL, bodyT, w, h, 15);
                ctx.fill();

                // 5. Front Face (the cab / nose)
                ctx.fillStyle = this.theme.dark;
                ctx.beginPath();
                ctx.moveTo(bodyL,  bodyT + 5);
                ctx.lineTo(front,  bodyT + 15);
                ctx.lineTo(front,  bodyB - 5);
                ctx.lineTo(bodyL,  bodyB - 5);
                ctx.closePath();
                ctx.fill();

                // Windshield
                ctx.fillStyle = this.theme.window;
                ctx.beginPath();
                ctx.moveTo(bodyL - 5,  bodyT + 15);
                ctx.lineTo(front + 10, bodyT + 22);
                ctx.lineTo(front + 10, bodyB - 45);
                ctx.lineTo(bodyL - 5,  bodyB - 45);
                ctx.fill();

                // 6. TOP SURFACE (roof) — drawn after body so it visually overhangs the side panel
                const roofGrad = ctx.createLinearGradient(0, bodyT, 0, rfY);
                roofGrad.addColorStop(0, this.theme.light);  // near edge: brightest (sun-lit)
                roofGrad.addColorStop(1, this.theme.main);   // far edge: same hue, slightly darker
                ctx.fillStyle = roofGrad;
                ctx.beginPath();
                ctx.moveTo(front,    bodyT);   // near-front corner
                ctx.lineTo(bodyR,    bodyT);   // near-rear corner
                ctx.lineTo(rfRearX,  rfY);     // far-rear corner
                ctx.lineTo(rfFrontX, rfY);     // far-front corner
                ctx.closePath();
                ctx.fill();

                // Roof fold line (crease where sidewall meets roof)
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(front, bodyT);
                ctx.lineTo(bodyR, bodyT);
                ctx.stroke();

                // Roof far-edge highlight
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(rfFrontX, rfY);
                ctx.lineTo(rfRearX,  rfY);
                ctx.stroke();

                // Roof detail: AC unit visible from above (perspective-correct box)
                ctx.fillStyle = this.theme.dark;
                ctx.globalAlpha = 0.4;
                const acNX = bodyL + 25, acNW = 55;
                const acFX = acNX - tvX * 0.6;
                ctx.beginPath();
                ctx.moveTo(acNX,        bodyT - 2);
                ctx.lineTo(acNX + acNW, bodyT - 2);
                ctx.lineTo(acFX + acNW, rfY   + 3);
                ctx.lineTo(acFX,        rfY   + 3);
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // Roof centre longitudinal stripe
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo((front + bodyR) / 2,       bodyT);
                ctx.lineTo((rfFrontX + rfRearX) / 2,  rfY);
                ctx.stroke();

                // 7. Side Windows
                ctx.fillStyle = this.theme.window;
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.roundRect(bodyL + 25 + i*45, bodyT + 15, 35, 35, 6);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(bodyL + 30 + i*45, bodyT + 22);
                    ctx.lineTo(bodyL + 42 + i*45, bodyT + 22);
                    ctx.stroke();
                }

                // Headlight
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = this.isEngineOn ? 10 : 0;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.arc(bodyL - 15, bodyB - 25, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Grill
                ctx.strokeStyle = this.theme.grill;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(bodyL - 18, bodyB - 12 + i*4);
                    ctx.lineTo(bodyL - 5,  bodyB - 12 + i*4);
                    ctx.stroke();
                }

                // Exhaust Particles
                if(this.isEngineOn && Math.random() > 0.4) {
                    this.particles.push({
                        x: bodyR,
                        y: bodyB - 10,
                        size: Math.random() * 8 + 4,
                        vx: Math.random() * 2 + 1,
                        vy: -(Math.random() * 1.5),
                        life: 1
                    });
                }

                this.particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.04;
                    p.size *= 0.96;
                    ctx.fillStyle = `rgba(148, 163, 184, ${Math.max(0, p.life * 0.6)})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                    if(p.life <= 0) this.particles.splice(i, 1);
                });

                ctx.restore();
            }

            drawWheel(x, y, radius, rotation) {
                const ctx = this.ctx;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#94a3b8';
                ctx.beginPath();
                ctx.arc(0, 0, radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#64748b';
                ctx.lineWidth = 2;
                for(let i=0; i<4; i++) {
                    ctx.rotate(Math.PI/2);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(radius * 0.4, 0);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }


        // --- STATE ---
        let grid = [];
        let activeBuses = 0;
        let isPlaying = false;
        let startTime = 0;
        let timerInterval = null;
        let currentRunTime = 0;

        // Dummy Data for Leaderboard
        const defaultLeaderboard = [
            { name: "Neo", time: 18.4 },
            { name: "Trinity", time: 22.1 },
            { name: "Morpheus", time: 26.5 },
            { name: "Cipher", time: 31.0 },
            { name: "Smith", time: 35.8 },
            { name: "Oracle", time: 42.3 },
            { name: "Link", time: 48.9 },
            { name: "Dozer", time: 53.2 },
            { name: "Tank", time: 57.5 },
            { name: "Mouse", time: 59.9 }
        ];

        // --- DOM ELEMENTS ---
        const uiTimer = document.getElementById('timer');
        const gridEl = document.getElementById('grid');
        const startModal = document.getElementById('start-modal');
        const loseModal = document.getElementById('lose-modal');
        const winModal = document.getElementById('win-modal');
        const lbModal = document.getElementById('leaderboard-modal');
        const winTimeSpan = document.getElementById('win-time');
        const playerNameInput = document.getElementById('player-name');
        const lbBody = document.getElementById('leaderboard-body');

        // --- INITIALIZATION ---
        function resetToStart() {
            loseModal.classList.add('hidden');
            winModal.classList.add('hidden');
            lbModal.classList.add('hidden');
            startModal.classList.remove('hidden');
            gridEl.innerHTML = '';
            uiTimer.innerText = `${TOTAL_TIME.toFixed(1)}s`;
            uiTimer.classList.remove('warning');
        }

        function startGame() {
            startModal.classList.add('hidden');
            generateSolvablePuzzle();
            renderGrid();

            isPlaying = true;
            startTime = Date.now();
            uiTimer.classList.remove('warning');

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 50); 
        }

        // --- CORE LOGIC: Reverse-Drop Generation ---
        function generateSolvablePuzzle() {
            grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
            const totalCells = COLS * ROWS;
            const targetBuses = Math.floor(totalCells * DENSITY);
            activeBuses = 0;

            let attempts = 0;
            const maxAttempts = targetBuses * 20;

            while (activeBuses < targetBuses && attempts < maxAttempts) {
                attempts++;
                let x = Math.floor(Math.random() * COLS);
                let y = Math.floor(Math.random() * ROWS);
                if (grid[y][x] !== null) continue;

                let validDirs = [];
                if (isPathClear(x, y, 0, -1)) validDirs.push('U');
                if (isPathClear(x, y, 0, 1)) validDirs.push('D');
                if (isPathClear(x, y, -1, 0)) validDirs.push('L');
                if (isPathClear(x, y, 1, 0)) validDirs.push('R');

                if (validDirs.length > 0) {
                    let isBorder = (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1);
                    let outsideDirs = [];
                    let insideDirs = [];

                    validDirs.forEach(d => {
                        if (x === 0 && d === 'L') outsideDirs.push(d);
                        else if (x === COLS - 1 && d === 'R') outsideDirs.push(d);
                        else if (y === 0 && d === 'U') outsideDirs.push(d);
                        else if (y === ROWS - 1 && d === 'D') outsideDirs.push(d);
                        else insideDirs.push(d);
                    });

                    let chosenDir;
                    if (isBorder && insideDirs.length > 0 && Math.random() < 0.8) {
                        chosenDir = insideDirs[Math.floor(Math.random() * insideDirs.length)];
                    } else {
                        chosenDir = validDirs[Math.floor(Math.random() * validDirs.length)];
                    }

                    grid[y][x] = {
                        dir: chosenDir,
                        themeIndex: Math.floor(Math.random() * busThemes.length),
                        busInstance: null
                    };
                    activeBuses++;
                }
            }
        }

        function isPathClear(x, y, dx, dy) {
            let cx = x + dx;
            let cy = y + dy;
            while (cy >= 0 && cy < ROWS && cx >= 0 && cx < COLS) {
                if (grid[cy][cx] !== null) return false;
                cx += dx;
                cy += dy;
            }
            return true;
        }

        // --- RENDER LOGIC ---
        function renderGrid() {
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            gridEl.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;

            const gameArea = document.getElementById('game-area');
            const padding = 30;
            const maxWidth = gameArea.clientWidth - padding;
            const maxHeight = gameArea.clientHeight - padding;

            const cellSize = Math.floor(Math.min(maxWidth / COLS, maxHeight / ROWS));

            gridEl.style.width = `${cellSize * COLS}px`;
            gridEl.style.height = `${cellSize * ROWS}px`;

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    if (grid[y][x]) {
                        const cellData = grid[y][x];
                        
                        const wrapper = document.createElement('div');
                        wrapper.className = `bus-wrapper dir-${cellData.dir}`;
                        
                        const canvas = document.createElement('canvas');
                        canvas.className = 'bus-canvas';    
                        
                        const dpr = window.devicePixelRatio || 1;
                        canvas.width = cellSize * dpr;
                        canvas.height = cellSize * dpr;
                        canvas.style.width = `${cellSize}px`;
                        canvas.style.height = `${cellSize}px`;

                        // Instantiate and draw static bus immediately
                        const bus = new CartoonBus(canvas, cellData.themeIndex);
                        bus.draw();
                        cellData.busInstance = bus;

                        wrapper.appendChild(canvas);

                        wrapper.onpointerdown = (e) => {
                            e.preventDefault();
                            handleTap(x, y, wrapper, bus);
                        };

                        cell.appendChild(wrapper);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        // --- GAMEPLAY INTERACTION ---
        function handleTap(x, y, wrapper, bus) {
            if (!isPlaying) return;
            const cellData = grid[y][x];
            if (!cellData) return;
            const dir = cellData.dir;

            let dx = 0, dy = 0;
            if (dir === 'U') dy = -1;
            if (dir === 'D') dy = 1;
            if (dir === 'L') dx = -1;
            if (dir === 'R') dx = 1;

            if (isPathClear(x, y, dx, dy)) {
                grid[y][x] = null;
                activeBuses--;

                // Turn on engine for visual escaping effect
                bus.startEngine();
                animateFlyOut(wrapper, dir, bus);

                if (activeBuses === 0) {
                    handleWin();
                }
            } else {
                wrapper.classList.remove('shake');
                void wrapper.offsetWidth; 
                wrapper.classList.add('shake');
            }
        }

        function animateFlyOut(wrapper, dir, bus) {
            const rect = wrapper.getBoundingClientRect();

            // Pop it out of the grid to move it cleanly across the body
            wrapper.style.position = 'fixed';
            wrapper.style.left = `${rect.left}px`;
            wrapper.style.top = `${rect.top}px`;
            wrapper.style.width = `${rect.width}px`;
            wrapper.style.height = `${rect.height}px`;
            document.body.appendChild(wrapper);

            wrapper.classList.add('flying');

            // Set final position outside the screen
            requestAnimationFrame(() => {
                const distance = Math.max(window.innerWidth, window.innerHeight) * 1.5;
                if (dir === 'U') wrapper.style.top = `${rect.top - distance}px`;
                if (dir === 'D') wrapper.style.top = `${rect.top + distance}px`;
                if (dir === 'L') wrapper.style.left = `${rect.left - distance}px`;
                if (dir === 'R') wrapper.style.left = `${rect.left + distance}px`;
            });

            setTimeout(() => {
                bus.stopEngine();
                if (wrapper.parentNode) wrapper.remove();
            }, 600);
        }

        // --- TIMER & END GAME ---
        function updateTimer() {
            if (!isPlaying) return;

            const elapsed = (Date.now() - startTime) / 1000;
            const timeLeft = Math.max(0, TOTAL_TIME - elapsed);

            uiTimer.innerText = `${timeLeft.toFixed(1)}s`;

            if (timeLeft <= 10 && !uiTimer.classList.contains('warning')) {
                uiTimer.classList.add('warning');
            }

            if (timeLeft === 0) {
                handleLose();
            }
        }

        function handleWin() {
            isPlaying = false;
            clearInterval(timerInterval);
            currentRunTime = ((Date.now() - startTime) / 1000).toFixed(1);
            winTimeSpan.innerText = currentRunTime;
            playerNameInput.value = '';
            setTimeout(() => { winModal.classList.remove('hidden'); }, 300); 
        }

        function handleLose() {
            isPlaying = false;
            clearInterval(timerInterval);
            uiTimer.innerText = "0.0s";
            loseModal.classList.remove('hidden');
        }

        // --- LEADERBOARD LOGIC ---
        function getLeaderboard() {
            const stored = localStorage.getItem('busEscapeLB');
            if (stored) {
                return JSON.parse(stored);
            }
            localStorage.setItem('busEscapeLB', JSON.stringify(defaultLeaderboard));
            return [...defaultLeaderboard];
        }

        function submitScore() {
            let name = playerNameInput.value.trim();
            if (!name) name = "Anonymous";

            let lb = getLeaderboard();
            const newEntry = { name: name, time: parseFloat(currentRunTime), isPlayer: true };
            lb.push(newEntry);
            lb.sort((a, b) => a.time - b.time);
            lb = lb.slice(0, 10);

            const toSave = lb.map(entry => ({ name: entry.name, time: entry.time }));
            localStorage.setItem('busEscapeLB', JSON.stringify(toSave));

            winModal.classList.add('hidden');
            renderLeaderboard(lb); 
            lbModal.classList.remove('hidden');
        }

        function showLeaderboardModal() {
            startModal.classList.add('hidden');
            renderLeaderboard(getLeaderboard());
            lbModal.classList.remove('hidden');
        }

        function renderLeaderboard(data) {
            lbBody.innerHTML = '';
            data.forEach((entry, index) => {
                const tr = document.createElement('tr');
                if (entry.isPlayer) tr.classList.add('highlight');

                tr.innerHTML = `
                    <td>#${index + 1}</td>
                    <td>${escapeHTML(entry.name)}</td>
                    <td class="time-col">${entry.time.toFixed(1)}</td>
                `;
                lbBody.appendChild(tr);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        window.addEventListener('resize', () => {
            if (isPlaying || gridEl.innerHTML !== '') {
                // To maintain physics state without restarting, we just re-run the renderer
                // Static frames will be redrawn smoothly with the new scaled sizes!
                renderGrid(); 
            }
        });

    </script>
</body>
