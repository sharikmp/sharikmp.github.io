<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Escape</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="sound-toggle" class="sound-toggle" onclick="toggleSound()">🔊</div>

    <div id="header">
        <span id="header-level-name" class="hidden"></span>
        <span id="header-sep" class="hdot hidden"> &middot; </span>
        <span id="header-stage-label" class="hidden"></span>
        <span id="header-sep2" class="hdot hidden"> &middot; &#9201;&nbsp;</span>
        <span id="timer">--</span>
    </div>

    <div id="game-area">
        <div id="grid"></div>
    </div>

    <div id="start-modal" class="modal-overlay">
        <img id="start-bus-img" src="bus.png" alt="Bus">
        <h1>Bus Escape</h1>
        <p>Tap a bus to release it &mdash; only if its path to the edge is clear.<br>Clear all buses before time runs
            out!</p>
        <div id="level-cards"></div>
        <button class="leaderboard-btn" onclick="showLeaderboardModal()">LEADERBOARD</button>
    </div>

    <div id="result-modal" class="modal-overlay hidden">
        <h1 id="result-title"></h1>
        <div class="result-stats">
            <div class="stat-row">
                <span class="stat-label">Cleared</span>
                <span id="stat-cleared" class="stat-value">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Remaining</span>
                <span id="stat-remaining" class="stat-value">0</span>
            </div>
            <div class="stat-row pct-row">
                <span class="stat-label">% Cleared</span>
                <div class="pct-ring-wrap">
                    <svg class="pct-ring" viewBox="0 0 84 84">
                        <circle class="pct-bg" cx="42" cy="42" r="31.5" />
                        <circle id="pct-arc" class="pct-arc" cx="42" cy="42" r="31.5" />
                    </svg>
                    <span id="stat-pct" class="pct-label">0%</span>
                </div>
            </div>
        </div>
        <!-- Video placeholder: remove "hidden" from div below and set iframe src to activate -->
        <div id="result-video" class="hidden">
            <!-- <iframe src="" frameborder="0" allowfullscreen height="180"></iframe> -->
        </div>
        <div id="result-name-row" class="hidden">
            <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" autocomplete="off">
        </div>
        <div id="result-buttons"></div>
    </div>

    <div id="leaderboard-modal" class="modal-overlay hidden">
        <h1>Top Drivers &mdash; <span id="lb-level-name" style="color:var(--accent)"></span></h1>
        <div class="leaderboard-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th style="text-align:right;">Time (s)</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
        <div id="lb-tabs"></div>
        <button onclick="resetToStart()">MAIN MENU</button>
    </div>

    <audio id="beep-beep-audio" src="beep-beep.mp3"></audio>
    <audio id="incorrect-audio" src="incorrect.mp3"></audio>

    <footer id="footer">
        <p>Made with ❤️ and code by <strong>Sharik</strong></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
