<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded blue background -->
  <rect width="100" height="100" rx="20" fill="#3b4fce"/>
  <!-- Mortarboard top (diamond) -->
  <polygon points="50,16 85,33 50,45 15,33" fill="white"/>
  <!-- Cap body -->
  <path d="M28,35 L28,58 C28,64 38,69 50,69 C62,69 72,64 72,58 L72,35 L50,43 Z" fill="rgba(255,255,255,0.88)"/>
  <!-- Tassel cord -->
