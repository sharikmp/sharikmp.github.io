<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | WonderToys</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="assets/styles.css">
        <style>
        :root {
            --bg-color: #FFFFFF;
            --primary: #F16AAB;
            --secondary: #FFD34C;
            --tertiary: #95BA43;
            --text-dark: #2C3E50;
            --text-light: #6C7A89;
            --radius-lg: 30px;
            --radius-md: 20px;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
            --wt-dark: #2B2B2B;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f8f9fa;
            color: var(--text-dark);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Fredoka', sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 1.8rem;
            color: var(--primary) !important;
            cursor: pointer;
            font-weight: bold;
        }

        .navbar-brand span {
            color: var(--secondary);
        }

        .cart-container {
            padding-top: 100px;
            padding-bottom: 60px;
            min-height: 80vh;
        }

        .cart-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-soft);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-size: 1.3rem;
            color: var(--tertiary);
            font-weight: bold;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: fit-content;
            padding: 5px;
        }

        .quantity-control button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            color: var(--text-dark);
        }

        .quantity-control input {
            width: 50px;
            text-align: center;
            border: none;
            outline: none;
        }

        .remove-btn {
            background-color: #fee;
            color: #c00;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background-color: #fdd;
        }

        .order-summary {
            background: white;
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-soft);
            position: sticky;
            top: 120px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-row.total {
            border: none;
            padding-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--tertiary);
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-checkout:hover {
            background-color: #d85295;
            transform: translateY(-3px);
        }

        .btn-continue-shopping {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--tertiary);
            border: 2px solid var(--tertiary);
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-continue-shopping:hover {
            background-color: var(--tertiary);
            color: white;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart i {
            font-size: 4rem;
            color: #ccc;
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            background-color: var(--wt-dark);
            color: white;
            padding: 50px 0 30px;
            margin-top: 60px;
            border-top: 10px solid var(--primary);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--secondary);
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }

            .order-summary {
                position: static;
                margin-top: 30px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Wonder<span>Toyz</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html#product-grid-section">Categories</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Our Story</a></li>
                    <li class="nav-item" style="opacity: 0.5;"><a class="nav-link fw-bold">Contact</a></li>
                    <li class="nav-item ms-lg-3">
                        <a href="cart.html"
                            class="btn btn-outline-dark rounded-circle px-3 py-2 position-relative border-0 shadow-sm"
                            style="background-color: var(--primary); color: white;">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill"
                                style="background-color: var(--secondary) !important; border: 2px solid white; color: black;" id="cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <div class="cart-container">
        <div class="container">
            <h1 class="mb-5">🛒 Shopping Cart</h1>

            <div class="row">
                <div class="col-lg-8" id="cart-items-container">
                    <!-- Cart items will be rendered here -->
                </div>
                <div class="col-lg-4">
                    <div class="order-summary">
                        <h5 class="mb-4">Order Summary</h5>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%)</span>
                            <span id="tax">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span id="shipping">FREE</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="total">$0.00</span>
                        </div>
                        <button class="btn-checkout" onclick="goToCheckout()">
                            <i class="bi bi-credit-card me-2"></i> Proceed to Checkout
                        </button>
                        <button class="btn-continue-shopping" onclick="goToShop()">
                            <i class="bi bi-shop me-2"></i> Continue Shopping
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="container">
            <div class="row gy-4">
                <div class="col-lg-6">
                    <h3 class="mb-3" style="color: white; font-size: 1.8rem;">Wonder<span
                            style="color: var(--secondary);">Toys</span></h3>
                    <p style="color: rgba(255,255,255,0.7); line-height: 1.8;">Making childhood magical, one toy at a time.</p>
                </div>
                <div class="col-lg-6 text-lg-end">
                    <p style="color: rgba(255,255,255,0.7);">&copy; 2026 WonderToys E-Commerce.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Shared Application Logic -->
    <script src="assets/app.js"></script>

    <!-- Page-Specific Logic -->
    <script>
        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-items-container');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="bi bi-cart-x"></i>
                        <h2>Your cart is empty</h2>
                        <p style="color: var(--text-light); margin-bottom: 30px;">Let's add some magical toys!</p>
                        <a href="index.html" class="btn btn-lg" style="background-color: var(--tertiary); color: white;">
                            <i class="bi bi-shop me-2"></i> Continue Shopping
                        </a>
                    </div>
                `;
                document.querySelector('.order-summary').style.display = 'none';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">$${parseFloat(item.price).toFixed(2)}</div>
                    </div>
                    <div class="quantity-control">
                        <button onclick="updateQuantity(${item.id}, ${Math.max(1, item.quantity - 1)})">−</button>
                        <input type="number" value="${item.quantity}" onchange="updateQuantity(${item.id}, this.value)" readonly>
                        <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <div style="text-align: right; min-width: 100px;">
                        <div style="font-size: 1.2rem; font-weight: bold; color: var(--tertiary); margin-bottom: 10px;">
                            $${(parseFloat(item.price) * item.quantity).toFixed(2)}
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id}); renderCart();">
                            <i class="bi bi-trash"></i> Remove
                        </button>
                    </div>
                </div>
            `).join('');

            // Update order summary
            const { subtotal, tax, total } = calculateTotals(cart);
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
            document.querySelector('.order-summary').style.display = 'block';
        }

        function goToCheckout() {
            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'checkout.html';
        }

        function goToShop() {
            window.location.href = 'index.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateCartBadge();
        });
    </script>
</body>

</html>
