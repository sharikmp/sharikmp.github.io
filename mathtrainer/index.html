<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="MathTrainer — Train Speed. Sharpen Precision." />
  <title>MathTrainer — Math Blitz</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =============================================
       THREE.JS BACKGROUND CANVAS (z-index: 0)
       Renders floating 3D numbers / geometric shapes
  ============================================= -->
  <canvas id="bg-canvas"></canvas>

  <!-- =============================================
       SCREEN 1: HERO / LANDING STATE
  ============================================= -->
  <div id="screen-hero" class="screen active d-flex flex-column align-items-center justify-content-center vh-100">

    <!-- Ad Slot: Top Banner (mobile/desktop) -->
    <div class="ad-slot ad-slot--top d-flex align-items-center justify-content-center">
      <span class="ad-label">AD</span>
    </div>

    <!-- Hero Centerpiece -->
    <div class="hero-center text-center px-3">
      <!-- Logo mark -->
      <div class="logo-mark mb-2" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="24,4 44,44 4,44" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="14" y1="30" x2="34" y2="30" stroke="url(#gold-grad)" stroke-width="2.5"/>
          <defs>
            <linearGradient id="gold-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#FFA500"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="hero-title">MATH<span class="title-accent">BLITZ</span></h1>
      <p class="hero-subtitle">Train Speed. Sharpen Precision.</p>

      <!-- Difficulty selector -->
      <div class="difficulty-row d-flex justify-content-center gap-2 mb-4" role="group" aria-label="Select difficulty">
        <button class="diff-btn active" data-diff="easy">Easy</button>
        <button class="diff-btn" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>

      <!-- CTA -->
      <button id="btn-start" class="btn-blitz pulse" aria-label="Start Blitz">
        <span class="btn-blitz__icon" aria-hidden="true">⚡</span>
        Start Blitz
      </button>

      <!-- Stats row (high score etc.) -->
      <div class="hero-stats d-flex justify-content-center gap-4 mt-4">
        <div class="stat-chip">
          <span class="stat-chip__label">Best</span>
          <span class="stat-chip__value" id="hero-best">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">Games</span>
          <span class="stat-chip__value" id="hero-games">0</span>
        </div>
      </div>
    </div>

    <!-- Ad Slot: Bottom Banner -->
    <div class="ad-slot ad-slot--bottom d-flex align-items-center justify-content-center">
      <span class="ad-label">AD</span>
    </div>
  </div><!-- /screen-hero -->


  <!-- =============================================
       SCREEN 2: ACTIVE GAMEPLAY ("THE BLITZ")
  ============================================= -->
  <div id="screen-game" class="screen d-flex flex-column vh-100">

    <!-- Timer bar (top slim progress) -->
    <div class="timer-bar-wrap" role="progressbar" aria-label="Time remaining" aria-valuemin="0" aria-valuemax="100">
      <div id="timer-bar" class="timer-bar"></div>
    </div>

    <!-- Game Header -->
    <div class="game-header d-flex align-items-center justify-content-between px-3 px-md-4">
      <button class="btn-icon" id="btn-quit" aria-label="Quit game" title="Quit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <div class="d-flex align-items-center gap-3">
        <!-- Streak -->
        <div class="hud-chip streak-chip">
          <span class="hud-chip__icon" aria-hidden="true">🔥</span>
          <span id="hud-streak">0</span>
        </div>
        <!-- Score -->
        <div class="hud-chip score-chip">
          <span class="hud-chip__label">Score</span>
          <span id="hud-score">0</span>
        </div>
        <!-- Timer countdown -->
        <div class="hud-chip timer-chip">
          <span class="hud-chip__label">Time</span>
          <span id="hud-timer">60</span>
        </div>
      </div>
    </div>

    <!-- Ad Slot: Game Top (leaderboard / banner) -->
    <div class="ad-slot ad-slot--game-top d-flex align-items-center justify-content-center">
      <span class="ad-label">AD</span>
    </div>

    <!-- Main game card area -->
    <div class="game-main flex-grow-1 d-flex align-items-center justify-content-center px-3">
      <div class="game-card" id="game-card">

        <!-- Question number badge -->
        <div class="q-badge" id="q-badge">Q1</div>

        <!-- Math problem display -->
        <div class="problem-display" id="problem-display" aria-live="polite" aria-atomic="true">
          <span id="problem-text">12 × 8</span>
        </div>

        <!-- Answer input -->
        <div class="input-wrap" id="input-wrap">
          <input
            type="number"
            id="answer-input"
            class="answer-input"
            inputmode="decimal"
            pattern="[0-9]*"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            placeholder="?"
            aria-label="Your answer"
            maxlength="6"
          />
          <button class="btn-submit" id="btn-submit" aria-label="Submit answer">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        <!-- Feedback bar -->
        <div class="feedback-bar" id="feedback-bar" aria-live="assertive"></div>

        <!-- Progress info -->
        <div class="q-progress d-flex justify-content-between align-items-center mt-3">
          <span class="q-progress__txt" id="q-correct">✓ 0 correct</span>
          <span class="q-progress__txt" id="q-total">0 answered</span>
        </div>

      </div><!-- /game-card -->
    </div><!-- /game-main -->

    <!-- Ad Slot: Game Bottom (sticky banner) -->
    <div class="ad-slot ad-slot--game-bottom d-flex align-items-center justify-content-center">
      <span class="ad-label">AD</span>
    </div>

  </div><!-- /screen-game -->


  <!-- =============================================
       SCREEN 3: POST-GAME DASHBOARD (Results)
       Uses Bootstrap modal pattern but inline (no reload)
  ============================================= -->
  <div id="screen-results" class="screen d-flex flex-column align-items-center justify-content-start vh-100">

    <!-- Confetti layer (canvas-confetti targets body by default) -->

    <div class="results-scroll w-100 d-flex flex-column align-items-center">

      <!-- Ad Slot: Results Top -->
      <div class="ad-slot ad-slot--results-top d-flex align-items-center justify-content-center w-100">
        <span class="ad-label">AD</span>
      </div>

      <!-- Results Card -->
      <div class="results-card px-3 px-md-4 py-4 text-center w-100" style="max-width:520px;">

        <!-- Personal best banner (conditional) -->
        <div class="pb-banner" id="pb-banner" style="display:none;">
          <span class="pb-banner__icon">🏆</span>
          <span>NEW PERSONAL BEST!</span>
        </div>

        <!-- Game Over heading -->
        <h2 class="results-title">Blitz Complete</h2>
        <p class="results-sub" id="results-diff-label">Medium Mode</p>

        <!-- Score hero -->
        <div class="score-hero">
          <span class="score-hero__value" id="results-score">0</span>
          <span class="score-hero__label">points</span>
        </div>

        <!-- Data tiles grid -->
        <div class="row g-2 mt-3 mb-3">

          <!-- Velocity (QPM) -->
          <div class="col-4">
            <div class="data-tile">
              <div class="data-tile__icon" aria-hidden="true">⚡</div>
              <div class="data-tile__value" id="tile-qpm">0</div>
              <div class="data-tile__label">QPM</div>
              <div class="data-tile__sub">Velocity</div>
            </div>
          </div>

          <!-- Precision (Accuracy) -->
          <div class="col-4">
            <div class="data-tile data-tile--accent">
              <div class="data-tile__icon" aria-hidden="true">🎯</div>
              <div class="data-tile__value" id="tile-accuracy">0%</div>
              <div class="data-tile__label">Accuracy</div>
              <div class="data-tile__sub">Precision</div>
            </div>
          </div>

          <!-- Milestone (Best Streak) -->
          <div class="col-4">
            <div class="data-tile">
              <div class="data-tile__icon" aria-hidden="true">🔥</div>
              <div class="data-tile__value" id="tile-streak">0</div>
              <div class="data-tile__label">Best Streak</div>
              <div class="data-tile__sub">Milestone</div>
            </div>
          </div>

        </div><!-- /row -->

        <!-- Secondary stats -->
        <div class="sec-stats d-flex justify-content-between px-2 mb-4">
          <div class="sec-stat">
            <span class="sec-stat__v" id="stat-total">0</span>
            <span class="sec-stat__l">Answered</span>
          </div>
          <div class="sec-stat">
            <span class="sec-stat__v" id="stat-correct">0</span>
            <span class="sec-stat__l">Correct</span>
          </div>
          <div class="sec-stat">
            <span class="sec-stat__v" id="stat-best">—</span>
            <span class="sec-stat__l">All-Time Best</span>
          </div>
        </div>

        <!-- Action buttons -->
        <button id="btn-replay" class="btn-blitz w-100 mb-2">
          <span class="btn-blitz__icon" aria-hidden="true">⚡</span>
          Go Again
        </button>
        <button id="btn-share" class="btn-ghost w-100 mb-3">
          <span aria-hidden="true">📤</span>
          Share Score
        </button>

        <!-- Back to menu -->
        <button id="btn-menu" class="btn-text-link">← Back to Menu</button>

      </div><!-- /results-card -->

      <!-- Ad Slot: Results Bottom -->
      <div class="ad-slot ad-slot--results-bottom d-flex align-items-center justify-content-center w-100">
        <span class="ad-label">AD</span>
      </div>

    </div><!-- /results-scroll -->

  </div><!-- /screen-results -->


  <!-- =============================================
       LIBRARIES
  ============================================= -->
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Three.js r168 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- App Script -->
  <script src="script.js"></script>
</body>
</html>
